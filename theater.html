<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Story.fun | 剧场</title>
  <style>
    :root {
      --bg: #f5faff;
      --surface: #ffffff;
      --accent: #00b388;
      --accent-soft: rgba(0, 179, 136, 0.12);
      --accent-glow: rgba(0, 179, 136, 0.25);
      --text: #13202e;
      --text-muted: #5e6f83;
      --border: #deeaf7;
      --shadow-sm: 0 4px 12px rgba(27, 45, 71, 0.06);
      --shadow-md: 0 12px 28px rgba(27, 45, 71, 0.07);
      --shadow-lg: 0 20px 45px rgba(27, 45, 71, 0.10);
      --radius: 24px;
      --radius-lg: 32px;
      font-family: "PingFang SC", "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif;
    }

    * { box-sizing: border-box; }
    html { scroll-behavior: smooth; }
    body { margin: 0; min-height: 100vh; background: var(--bg); color: var(--text); }
    .app-shell { max-width: 1280px; margin: 0 auto; padding: 24px; }
    .header { display: flex; flex-wrap: wrap; justify-content: space-between; align-items: center; gap: 16px; padding: 18px 24px; background: rgba(255,255,255,0.72); backdrop-filter: blur(16px); -webkit-backdrop-filter: blur(16px); border: 1px solid var(--border); border-radius: var(--radius); box-shadow: var(--shadow-sm); margin-bottom: 40px; }
    .brand { display: flex; align-items: center; gap: 14px; }
    .brand .icon { width: 38px; height: 38px; border-radius: 50%; background: linear-gradient(135deg, rgba(0,179,136,0.18), rgba(0,179,136,0.06)); display: grid; place-items: center; color: var(--accent); font-weight: 700; font-size: 1rem; border: 1px solid rgba(0, 179, 136, 0.30); }
    .brand h1 { margin: 0; font-size: 1.2rem; }
    .brand .small { display: block; font-size: 0.92rem; color: var(--text-muted); }

    .nav-links { display: flex; flex-wrap: wrap; gap: 10px; }
    .nav-link { text-decoration: none; color: var(--text-muted); padding: 10px 18px; border-radius: 999px; transition: all 0.25s ease; font-weight: 600; font-size: 0.94rem; }
    .nav-link:hover { color: var(--text); background: rgba(0,0,0,0.03); }
    .nav-link.active { color: var(--accent); background: var(--accent-soft); box-shadow: inset 0 0 0 1px rgba(0,179,136,0.15); }

    /* ===== Auth Styles ===== */
    .auth-container { display: flex; align-items: center; }
    .auth-login-btn { display: inline-flex; align-items: center; gap: 6px; padding: 8px 18px; border-radius: 999px; border: 1px solid var(--border); background: var(--surface); color: var(--text); font-size: 0.88rem; font-weight: 600; cursor: pointer; transition: all 0.2s ease; white-space: nowrap; }
    .auth-login-btn:hover { border-color: var(--accent); color: var(--accent); background: var(--accent-soft); }
    .auth-login-icon { font-size: 1rem; }
    .auth-user-menu { position: relative; }
    .auth-avatar { width: 36px; height: 36px; border-radius: 50%; overflow: hidden; cursor: pointer; border: 2px solid var(--accent-soft); transition: border-color 0.2s; position: relative; flex-shrink: 0; }
    .auth-avatar:hover { border-color: var(--accent); }
    .auth-avatar img { width: 100%; height: 100%; object-fit: cover; display: block; }
    .auth-avatar-dot { position: absolute; bottom: -1px; right: -1px; width: 10px; height: 10px; border-radius: 50%; background: #22c55e; border: 2px solid var(--surface); }
    .auth-dropdown { position: absolute; top: calc(100% + 10px); right: 0; width: 240px; background: var(--surface); border: 1px solid var(--border); border-radius: 16px; box-shadow: 0 12px 40px rgba(27,45,71,0.15); opacity: 0; visibility: hidden; transform: translateY(-8px); transition: all 0.25s ease; z-index: 100; overflow: hidden; }
    .auth-dropdown.active { opacity: 1; visibility: visible; transform: translateY(0); }
    .auth-dropdown-header { display: flex; align-items: center; gap: 12px; padding: 16px 18px; }
    .auth-dropdown-header img { width: 40px; height: 40px; border-radius: 50%; object-fit: cover; }
    .auth-dropdown-name { font-weight: 600; font-size: 0.92rem; color: var(--text); }
    .auth-dropdown-wallet { font-size: 0.78rem; color: var(--text-muted); font-family: monospace; margin-top: 2px; }
    .auth-dropdown-divider { height: 1px; background: var(--border); margin: 0; }
    .auth-dropdown-item { display: flex; align-items: center; gap: 10px; padding: 12px 18px; color: var(--text); text-decoration: none; font-size: 0.9rem; transition: background 0.15s; cursor: pointer; }
    .auth-dropdown-item:hover { background: rgba(0,0,0,0.03); }
    .auth-dropdown-item span { font-size: 1.1rem; }
    .auth-dropdown-logout { color: #f45b69; }
    .auth-dropdown-logout:hover { background: rgba(244,91,105,0.06); }
    /* Login Modal */
    .auth-modal-overlay { position: fixed; inset: 0; z-index: 9999; display: flex; align-items: center; justify-content: center; padding: 24px; background: rgba(15,23,42,0.4); backdrop-filter: blur(4px); opacity: 0; visibility: hidden; transition: all 0.3s ease; }
    .auth-modal-overlay.active { opacity: 1; visibility: visible; }
    .auth-modal { background: var(--surface); border-radius: 28px; width: 100%; max-width: 420px; box-shadow: 0 40px 80px rgba(27,45,71,0.2); overflow: hidden; transform: scale(0.95) translateY(10px); transition: transform 0.3s ease; }
    .auth-modal-overlay.active .auth-modal { transform: scale(1) translateY(0); }
    .auth-modal-close { position: absolute; top: 16px; right: 16px; width: 32px; height: 32px; border-radius: 50%; border: none; background: rgba(0,0,0,0.04); cursor: pointer; display: grid; place-items: center; font-size: 1.1rem; color: var(--text-muted); transition: all 0.2s; z-index: 1; }
    .auth-modal-close:hover { background: rgba(0,0,0,0.08); color: var(--text); }
    .auth-modal-header { text-align: center; padding: 36px 28px 20px; position: relative; }
    .auth-modal-logo { width: 56px; height: 56px; border-radius: 50%; background: linear-gradient(135deg, var(--accent), #00d4a3); display: grid; place-items: center; color: #fff; font-weight: 700; font-size: 1.3rem; margin: 0 auto 16px; box-shadow: 0 4px 16px rgba(0,179,136,0.3); }
    .auth-modal-header h2 { margin: 0 0 6px; font-size: 1.4rem; }
    .auth-modal-header p { margin: 0; color: var(--text-muted); font-size: 0.92rem; }
    .auth-modal-body { padding: 8px 28px 32px; display: flex; flex-direction: column; gap: 12px; }
    .auth-social-btn { display: flex; align-items: center; justify-content: center; gap: 10px; width: 100%; padding: 14px; border-radius: 14px; border: 1px solid var(--border); background: var(--surface); color: var(--text); font-size: 0.95rem; font-weight: 600; cursor: pointer; transition: all 0.2s ease; }
    .auth-social-btn:hover { border-color: var(--accent); background: var(--accent-soft); }
    .auth-social-btn:disabled { opacity: 0.5; cursor: not-allowed; }
    .auth-divider { display: flex; align-items: center; gap: 12px; color: var(--text-muted); font-size: 0.85rem; margin: 4px 0; }
    .auth-divider::before, .auth-divider::after { content: ''; flex: 1; height: 1px; background: var(--border); }
    .auth-wallet-btn { display: flex; align-items: center; justify-content: center; gap: 10px; width: 100%; padding: 14px; border-radius: 14px; border: 2px dashed var(--accent); background: var(--accent-soft); color: var(--accent); font-size: 0.95rem; font-weight: 600; cursor: pointer; transition: all 0.2s ease; }
    .auth-wallet-btn:hover { background: rgba(0,179,136,0.2); }
    .auth-modal-tos { text-align: center; color: var(--text-muted); font-size: 0.82rem; line-height: 1.6; margin: 4px 0 0; }
    .auth-modal-tos a { color: var(--accent); text-decoration: none; }
    .auth-modal-tos a:hover { text-decoration: underline; }
    .auth-toast { position: fixed; top: 24px; left: 50%; transform: translateX(-50%) translateY(-100px); z-index: 10000; background: rgba(26,35,47,0.95); backdrop-filter: blur(8px); color: #fff; padding: 14px 24px; border-radius: 14px; font-size: 0.92rem; box-shadow: 0 12px 40px rgba(27,45,71,0.25); transition: transform 0.4s cubic-bezier(0.34,1.56,0.64,1), opacity 0.3s ease; opacity: 0; pointer-events: none; max-width: 400px; text-align: center; font-weight: 500; }
    .auth-toast.show { transform: translateX(-50%) translateY(0); opacity: 1; }

    .hero { display: grid; grid-template-columns: 1fr; gap: 26px; align-items: stretch; margin-bottom: 34px; }
    .hero-panel { padding: 32px; background: rgba(255,255,255,0.9); border: 1px solid var(--border); border-radius: var(--radius-lg); box-shadow: var(--shadow-md); }
    .hero-panel h2 { margin: 0 0 18px; font-size: clamp(2rem, 3vw, 3.2rem); line-height: 1.05; letter-spacing: -0.03em; }
    .hero-panel p { margin: 0 0 24px; color: var(--text-muted); font-size: 1.05rem; line-height: 1.8; max-width: 640px; }
    
    /* 新增搜索和筛选样式 */
    .search-container { margin-top: 20px; }
    .search-box { width: 100%; padding: 12px 16px; border-radius: 999px; border: 1px solid var(--border); font-size: 1rem; background: var(--surface); box-shadow: var(--shadow-sm); }
    .search-box:focus { outline: none; border-color: var(--accent); box-shadow: 0 0 0 3px rgba(0,179,136,0.15); }
    
    .filter-container { display: flex; flex-wrap: wrap; gap: 12px; margin-top: 20px; }
    .filter-tag { padding: 8px 16px; background: var(--accent-soft); color: var(--accent); border-radius: 999px; font-size: 0.9rem; cursor: pointer; transition: all 0.25s ease; }
    .filter-tag:hover { background: rgba(0,179,136,0.2); }
    .filter-tag.active { background: var(--accent); color: white; }
    
    .gallery { display: grid; grid-template-columns: repeat(3, minmax(0, 1fr)); gap: 22px; margin-bottom: 34px; }
    .card { position: relative; overflow: hidden; border-radius: 24px; min-height: 450px; display: flex; flex-direction: column; background: #fff; box-shadow: 0 12px 30px rgba(15, 32, 88, 0.08); border: 1px solid rgba(223, 230, 244, 0.92); }
    .card-thumb { width: 100%; height: 320px; object-fit: cover; border-bottom: 1px solid rgba(255,255,255,0.08); }
    .card-thumb::after { content: ""; position: absolute; inset: 0; background: linear-gradient(180deg, rgba(15, 22, 42, 0.03), rgba(15, 22, 42, 0.18)); pointer-events: none; }
    .thumb-gradient-1 { background: linear-gradient(135deg, #ff7a99 0%, #ffcd66 48%, #a15bff 100%); }
    .thumb-gradient-2 { background: linear-gradient(135deg, #6b8cff 0%, #8a5fff 45%, #ff88c6 100%); }
    .thumb-gradient-3 { background: linear-gradient(135deg, #ffa75c 0%, #ff6bae 35%, #8762ff 100%); }
    .card-body { padding: 24px 26px 20px; display: flex; flex-direction: column; gap: 18px; }
    .card-meta { display: flex; justify-content: space-between; gap: 12px; flex-wrap: wrap; }
    .badge, .episode { display: inline-flex; align-items: center; justify-content: center; border-radius: 999px; padding: 10px 14px; font-size: 0.85rem; font-weight: 700; }
    .badge { background: var(--accent-soft); color: var(--accent); }
    .episode { background: rgba(15, 22, 42, 0.05); color: #2d3b55; }
    .card h3 { margin: 0; font-size: 1.5rem; line-height: 1.25; }
    .card p { margin: 0; color: var(--text-muted); line-height: 1.75; }
    .card-foot { padding: 20px 26px 26px; border-top: 1px solid rgba(223, 230, 244, 0.9); display: flex; justify-content: space-between; align-items: center; gap: 14px; }
    .info-row { display: flex; flex-wrap: wrap; gap: 12px; color: var(--text-muted); font-size: 0.95rem; }

    
    .button, .button-secondary { border: none; cursor: pointer; border-radius: 999px; padding: 12px 20px; font-size: 0.95rem; transition: all 0.25s ease; }
    .button { background: var(--accent); color: #fff; font-weight: 600; box-shadow: 0 4px 14px rgba(0,179,136,0.30); }
    .button:hover { transform: translateY(-2px); box-shadow: 0 8px 24px rgba(0,179,136,0.40); }
    .button-secondary { background: transparent; color: var(--text); border: 1px solid rgba(0, 179, 136, 0.25); }
    .button-secondary:hover { background: rgba(0,179,136,0.05); border-color: rgba(0,179,136,0.40); }

    @media (max-width: 1120px) {
      .gallery { grid-template-columns: repeat(2, minmax(0, 1fr)); }
      .hero { grid-template-columns: 1fr; }
    }

    @media (max-width: 760px) {
      .app-shell { padding: 20px 16px 32px; }
      .header { padding: 18px 18px; }
      .nav-links { width: 100%; justify-content: center; }
      .hero-panel { padding: 24px; }
      .gallery { grid-template-columns: 1fr; }
      .card-foot { flex-direction: column; align-items: flex-start; }
      .card { min-height: auto; }
    }
    
    /* 优化后的竖版封面样式 */
    .card { 
      position: relative; 
      overflow: hidden; 
      border-radius: 24px; 
      min-height: 450px; 
      display: flex; 
      flex-direction: column; 
      background: #fff; 
      box-shadow: 0 12px 30px rgba(15, 32, 88, 0.08); 
      border: 1px solid rgba(223, 230, 244, 0.92); 
      transition: all 0.3s ease;
    }
    .card:hover {
      transform: translateY(-5px);
      box-shadow: 0 16px 40px rgba(15, 32, 88, 0.12);
    }
    
    .card-thumb { 
      width: 100%; 
      height: 320px; 
      object-fit: cover; 
      border-bottom: 1px solid rgba(255,255,255,0.08); 
      transition: all 0.3s ease;
    }
    
    .card-thumb:hover {
      transform: scale(1.03);
    }
    
    /* 改进的渐变效果 */
    .thumb-gradient-1 { 
      background: linear-gradient(135deg, #ff7a99 0%, #ffcd66 48%, #a15bff 100%); 
      filter: blur(0.5px);
    }
    .thumb-gradient-2 { 
      background: linear-gradient(135deg, #6b8cff 0%, #8a5fff 45%, #ff88c6 100%); 
      filter: blur(0.5px);
    }
    .thumb-gradient-3 { 
      background: linear-gradient(135deg, #ffa75c 0%, #ff6bae 35%, #8762ff 100%); 
      filter: blur(0.5px);
    }
    
    /* 卡片内容优化 */
    .card-body { 
      padding: 24px 26px 20px; 
      display: flex; 
      flex-direction: column; 
      gap: 18px; 
      flex-grow: 1;
    }
    
    .card h3 { 
      margin: 0; 
      font-size: 1.4rem; 
      line-height: 1.25; 
      font-weight: 600;
    }
    
    .card p { 
      margin: 0; 
      color: var(--text-muted); 
      line-height: 1.6; 
      font-size: 0.95rem;
    }
    
    .card-foot { 
      padding: 20px 26px 26px; 
      border-top: 1px solid rgba(223, 230, 244, 0.9); 
      display: flex; 
      justify-content: space-between; 
      align-items: center; 
      gap: 14px; 
    }
    
    .info-row { 
      display: flex; 
      flex-wrap: wrap; 
      gap: 12px; 
      color: var(--text-muted); 
      font-size: 0.95rem; 
    }
  </style>
</head>
<body>
  <div class="app-shell">
    <div id="header-placeholder"></div>

    <section class="hero">
      <div class="hero-panel">
        <h1>剧场</h1>
        <p>精选AI短剧，开启叙事新体验</p>
        
        <div class="search-container">
          <input type="text" id="searchInput" class="search-box" placeholder="搜索短剧名称..." />
        </div>
        
        <div class="filter-container">
          <span class="filter-tag active" data-filter="all">全部</span>
          <span class="filter-tag" data-filter="金融">金融</span>
          <span class="filter-tag" data-filter="悬疑">悬疑</span>
          <span class="filter-tag" data-filter="真实改编">真实改编</span>
          <span class="filter-tag" data-filter="爱情">爱情</span>
          <span class="filter-tag" data-filter="科幻">科幻</span>
          <span class="filter-tag" data-filter="剧情">剧情</span>
          <span class="filter-tag" data-filter="喜剧">喜剧</span>
          <span class="filter-tag" data-filter="动作">动作</span>
        </div>
        
        <div class="filter-container" style="margin-top: 15px;">
          <span class="filter-tag active" data-filter="recommended">全部推荐</span>
          <span class="filter-tag" data-filter="newest">最新上架</span>
          <span class="filter-tag" data-filter="hot">最高热度</span>
          <span class="filter-tag" data-filter="favorites">最高收藏</span>
        </div>
      </div>

      
    </section>

    <div id="noResults" class="no-results" style="display: none; text-align: center; padding: 60px 20px; margin-bottom: 34px; background: rgba(255,255,255,0.7); border-radius: var(--radius-lg); border: 2px dashed var(--border);">
      <div style="font-size: 3rem; margin-bottom: 16px;">🔍</div>
      <h3 style="margin: 0 0 8px; color: var(--text); font-size: 1.3rem;">没有找到结果</h3>
      <p style="margin: 0; color: var(--text-muted); font-size: 0.95rem;">试试更换搜索关键词或筛选条件</p>
    </div>

    <section class="gallery" aria-label="热门剧场卡片">
      <article class="card" data-category="金融" data-sort="recommended" onclick="location.href='drama-detail.html'">
        <img class="card-thumb" src="https://images.unsplash.com/photo-1618044733300-9472054094ee?auto=format&fit=crop&w=800&q=80" alt="重生之我在币圈当大佬" />
        <div class="card-body">
          <div class="card-meta">
            <span class="badge">金融</span>
            <span class="episode">全44集</span>
          </div>
          <h3>重生之我在币圈当大佬</h3>
          <p>加密货币市场的至暗时刻，一场价值数百亿的赌局在AI短剧中上演。</p>
        </div>
        <div class="card-foot">
          <div class="info-row">
            <span>JACK</span>
            <span>1.2k</span>
            <span>4.9★</span>
          </div>
        </div>
      </article>

      <article class="card" data-category="悬疑" data-sort="newest" onclick="location.href='drama-detail.html'">
        <img class="card-thumb" src="https://images.unsplash.com/photo-1633158829585-23ba8f7c8caf?auto=format&fit=crop&w=800&q=80" alt="深渊回响" />
        <div class="card-body">
          <div class="card-meta">
            <span class="badge">悬疑</span>
            <span class="episode">全12集</span>
          </div>
          <h3>深渊回响</h3>
          <p>每一条线索都指向过去的真相，AI角色与观众共同推演悬疑谜题。</p>
        </div>
        <div class="card-foot">
          <div class="info-row">
            <span>EVA</span>
            <span>2.4k</span>
            <span>4.8★</span>
          </div>
        </div>
      </article>

      <article class="card" data-category="真实改编" data-sort="hot" onclick="location.href='drama-detail.html'">
        <img class="card-thumb" src="https://images.unsplash.com/photo-1560472354-b33ff0c44a43?auto=format&fit=crop&w=800&q=80" alt="暗流涌动" />
        <div class="card-body">
          <div class="card-meta">
            <span class="badge">真实改编</span>
            <span class="episode">全24集</span>
          </div>
          <h3>暗流涌动</h3>
          <p>真实事件改编，AI短剧在商业谍战与人性抉择间构建深度剧情张力。</p>
        </div>
        <div class="card-foot">
          <div class="info-row">
            <span>LENS</span>
            <span>1.8k</span>
            <span>4.7★</span>
          </div>
        </div>
      </article>
    </section>

    <script>
      // 搜索和筛选功能
      // 检查并更新"无结果"提示的显示状态
      function updateNoResults() {
        const noResults = document.getElementById('noResults');
        const cards = document.querySelectorAll('.card');
        let visibleCount = 0;
        cards.forEach(card => {
          if (card.style.display !== 'none') {
            visibleCount++;
          }
        });
        noResults.style.display = visibleCount === 0 ? 'block' : 'none';
      }

      document.addEventListener('DOMContentLoaded', function() {
        const searchInput = document.getElementById('searchInput');
        const filterTags = document.querySelectorAll('.filter-tag');
        const cards = document.querySelectorAll('.card');
        
        // 搜索功能
        searchInput.addEventListener('input', function() {
          const searchTerm = this.value.toLowerCase();
          
          cards.forEach(card => {
            const title = card.querySelector('h3').textContent.toLowerCase();
            const description = card.querySelector('p').textContent.toLowerCase();
            
            if (title.includes(searchTerm) || description.includes(searchTerm)) {
              card.style.display = 'flex';
            } else {
              card.style.display = 'none';
            }
          });
          
          updateNoResults();
        });
        
        // 筛选功能
        filterTags.forEach(tag => {
          tag.addEventListener('click', function() {
            // 移除所有标签的激活状态
            filterTags.forEach(t => t.classList.remove('active'));
            
            // 添加当前标签的激活状态
            this.classList.add('active');
            
            const filterValue = this.getAttribute('data-filter');
            
            // 处理分类筛选
            if (filterValue === 'all') {
              cards.forEach(card => {
                card.style.display = 'flex';
              });
            } else if (filterValue === 'recommended' || filterValue === 'newest' || filterValue === 'hot' || filterValue === 'favorites') {
              // 处理排序筛选
              cards.forEach(card => {
                const sortValue = card.getAttribute('data-sort');
                if (sortValue === filterValue) {
                  card.style.display = 'flex';
                } else {
                  card.style.display = 'none';
                }
              });
            } else {
              // 处理类别筛选
              cards.forEach(card => {
                const category = card.getAttribute('data-category');
                if (category === filterValue) {
                  card.style.display = 'flex';
                } else {
                  card.style.display = 'none';
                }
            });
            }
            
            updateNoResults();
          });
        });
      });
    </script>
  </div>
  <script src="load-header.js"></script>
  <script src="auth.js"></script>
</body>
</html>
