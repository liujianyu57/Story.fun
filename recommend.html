<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0,maximum-scale=1.0,user-scalable=no,viewport-fit=cover">
<title>Story.fun | 推荐</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
:root{--bg:#f5faff;--surface:#ffffff;--accent:#00b388;--accent-soft:rgba(0,179,136,0.12);--text:#13202e;--text-muted:#5e6f83;--border:#deeaf7;--radius:24px;font-family:"PingFang SC","Segoe UI",Roboto,"Helvetica Neue",Arial,sans-serif}
html,body{width:100%;height:100%;overflow:hidden;background:var(--bg);-webkit-tap-highlight-color:transparent;user-select:none}
#app{position:fixed;inset:0;overflow:hidden;background:#0f1825}
.watch-bar{position:fixed;left:0;right:0;bottom:calc(50px + 6px);z-index:102;height:44px;display:flex;align-items:center;justify-content:space-between;padding:0 16px;background:rgba(255,255,255,.08);backdrop-filter:blur(20px);-webkit-backdrop-filter:blur(20px);border-top:.5px solid rgba(255,255,255,.1);cursor:pointer;-webkit-tap-highlight-color:transparent;transition:background .2s}
.watch-bar:active{background:rgba(255,255,255,.15)}
.watch-bar .wb-left{display:flex;align-items:center;gap:8px;color:rgba(255,255,255,.9);font-size:12px;font-weight:500;min-width:0}
.watch-bar .wb-left svg{width:18px;height:18px;flex-shrink:0}
.watch-bar .wb-left .wb-text{overflow:hidden;white-space:nowrap;text-overflow:ellipsis}
.watch-bar .wb-right{display:flex;align-items:center;gap:4px;color:rgba(255,255,255,.6);font-size:12px;font-weight:400;flex-shrink:0;margin-left:8px}
.watch-bar .wb-right svg{width:16px;height:16px}
#track{position:absolute;left:0;top:0;width:100%;will-change:transform}
.slide{position:absolute;left:0;width:100%;height:100vh;overflow:hidden}
.slide-img{position:absolute;inset:0;width:100%;height:100%;object-fit:cover;display:block}
.slide-mask{position:absolute;inset:0;background:linear-gradient(180deg,rgba(15,24,37,0.1),rgba(15,24,37,0.05) 30%,rgba(15,24,37,0.4) 70%,rgba(15,24,37,0.82));pointer-events:none}
.play-btn{position:absolute;top:50%;left:50%;z-index:3;transform:translate(-50%,-50%);width:72px;height:72px;border-radius:50%;background:rgba(0,0,0,.5);backdrop-filter:blur(12px);-webkit-backdrop-filter:blur(12px);border:.5px solid rgba(255,255,255,.2);display:flex;align-items:center;justify-content:center;opacity:0;transition:opacity .25s;pointer-events:none;box-shadow:0 8px 32px rgba(0,0,0,.35)}
.play-btn.show{opacity:1}
.play-btn svg{width:30px;height:30px;fill:#fff;margin-left:3px}
.story-header-wrapper{position:fixed!important;top:0;left:0;right:0;z-index:200!important}.story-header-wrapper .header{background:rgba(18,24,35,.48)!important;backdrop-filter:blur(24px);-webkit-backdrop-filter:blur(24px);border-bottom:.5px solid rgba(255,255,255,.08)!important}.story-header-wrapper .hamburger-btn svg path{stroke:rgba(255,255,255,.9)!important}.story-header-wrapper .brand-text{opacity:.9}.story-header-wrapper .nav-link,.story-header-wrapper .lang-btn,.story-header-wrapper .lang-btn span{color:rgba(255,255,255,.75)!important}.story-header-wrapper .lang-btn svg circle,.story-header-wrapper .lang-btn svg path{stroke:rgba(255,255,255,.65)!important}
.info{position:absolute;left:18px;right:80px;bottom:calc(12px + 44px + 44px + 12px + env(safe-area-inset-bottom,0px));z-index:2;display:flex;flex-direction:column;gap:8px}
.danmaku-btn{display:inline-flex;align-items:center;gap:4px;padding:4px 10px 4px 8px;border-radius:999px;font-size:11px;font-weight:500;color:rgba(255,255,255,.95);background:rgba(255,255,255,.14);backdrop-filter:blur(8px);-webkit-backdrop-filter:blur(8px);border:.5px solid rgba(255,255,255,.2);cursor:pointer;transition:background .15s;align-self:flex-start;margin-bottom:2px}
.danmaku-btn:active{background:rgba(255,255,255,.25)}
.danmaku-btn svg{width:15px;height:15px;flex-shrink:0}
.info-title{font-size:20px;font-weight:700;color:#fff;line-height:1.3;text-shadow:0 2px 12px rgba(0,0,0,.5);display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;overflow:hidden;cursor:pointer}
.info-title>.gt{color:rgba(255,255,255,.45);font-size:17px;margin-left:1px}
.info-tags{display:flex;align-items:center;gap:8px;flex-wrap:wrap}
.info-tag{display:inline-flex;align-items:center;padding:2px 10px;border-radius:999px;font-size:11px;font-weight:600;background:rgba(255,255,255,.18);backdrop-filter:blur(8px);color:#fff;border:.5px solid rgba(255,255,255,.25)}
.info-rating{display:inline-flex;align-items:center;gap:2px;padding:2px 10px;border-radius:999px;font-size:11px;font-weight:600;background:rgba(255,255,255,.18);backdrop-filter:blur(8px);color:#fff;border:.5px solid rgba(255,255,255,.25)}
.info-rating .star{color:rgba(255,255,255,.85);margin-right:1px}
.info-ep{display:inline-flex;align-items:center;padding:2px 10px;border-radius:999px;font-size:11px;font-weight:600;background:rgba(255,255,255,.18);backdrop-filter:blur(8px);color:#fff;border:.5px solid rgba(255,255,255,.25);margin-left:4px}
.info-desc{font-size:12px;color:rgba(255,255,255,.7);line-height:1.5;display:flex;align-items:center;gap:4px;margin-top:-2px;flex-wrap:wrap}
.info-desc .desc-ep{color:rgba(255,255,255,.45);font-weight:400}
.info-desc .desc-sep{color:rgba(255,255,255,.25);margin:0 2px}
.info-desc .desc-text{overflow:hidden;white-space:nowrap;text-overflow:ellipsis;flex:1;min-width:0;max-width:calc(100% - 60px);color:rgba(255,255,255,.55)}
.info-desc .desc-expand{color:#00b388;font-weight:500;font-size:11px;cursor:pointer;flex-shrink:0;padding:1px 6px;border-radius:999px;background:rgba(0,179,136,.15);border:.5px solid rgba(0,179,136,.25);transition:background .15s}
.info-desc .desc-expand:active{background:rgba(0,179,136,.3)}
.info-crew{font-size:12px;display:flex;align-items:center;gap:6px;flex-wrap:wrap;margin-top:-2px}
.info-crew .c-item{display:inline-flex;align-items:center;gap:4px;padding:3px 10px;border-radius:999px;font-size:11px;line-height:1.3;background:rgba(255,255,255,.15);backdrop-filter:blur(8px);-webkit-backdrop-filter:blur(8px);border:.5px solid rgba(255,255,255,.2)}
.info-crew .c-item .c-label{color:rgba(255,255,255,.55);font-weight:400}
.info-crew .c-item .c-name{color:rgba(255,255,255,.92);font-weight:600}
.info-crew .c-div{color:rgba(255,255,255,.25);font-size:10px}
.info-author{font-size:12px;color:rgba(255,255,255,.75);display:flex;align-items:center;gap:5px;cursor:pointer}
.info-author img{width:20px;height:20px;border-radius:50%;border:1px solid rgba(255,255,255,.2);object-fit:cover}
.actions{position:absolute;right:10px;bottom:calc(20px + 44px + 44px + env(safe-area-inset-bottom,0px) + 40px);z-index:2;display:flex;flex-direction:column;align-items:center;gap:16px}
.act-creator{display:flex;flex-direction:column;align-items:center;gap:3px;cursor:pointer;border:none;background:none;padding:0;color:#fff;-webkit-tap-highlight-color:transparent}
.act-creator .ac-avatar{width:44px;height:44px;border-radius:50%;object-fit:cover;border:2px solid rgba(255,255,255,.5);box-shadow:0 2px 12px rgba(0,0,0,.3);transition:transform .15s}
.act-creator:active .ac-avatar{transform:scale(.85)}
.act-creator .ac-label{font-size:9px;font-weight:500;color:rgba(255,255,255,.8);line-height:1;padding:1px 6px;border-radius:999px;background:rgba(255,255,255,.12);backdrop-filter:blur(4px);max-width:44px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.act-btn{display:flex;flex-direction:column;align-items:center;gap:2px;cursor:pointer;border:none;background:none;padding:0;color:#fff;-webkit-tap-highlight-color:transparent;transition:transform .15s}
.act-btn:active{transform:scale(.82)}
.act-icon{width:44px;height:44px;border-radius:50%;display:flex;align-items:center;justify-content:center;background:rgba(255,255,255,.12);backdrop-filter:blur(8px);font-size:18px;transition:all .2s}
.act-icon.liked{color:#fff;background:var(--accent)}
.act-icon.bookmarked{color:#fff;background:#ffbb3a}
.act-label{font-size:10px;font-weight:500;color:rgba(255,255,255,.75);line-height:1}
/* ---- Player Progress Bar ---- */
.player-progress{position:fixed;left:0;right:0;bottom:50px;z-index:103;height:6px;background:rgba(0,0,0,.25);cursor:pointer;pointer-events:auto;touch-action:none;border-radius:3px;overflow:hidden}
.player-progress .pp-fill{height:100%;width:1%;min-width:2px;background:linear-gradient(90deg,#00b388,#34d399);border-radius:3px;position:relative;transition:none}
.player-progress .pp-fill .pp-thumb{position:absolute;right:-7px;top:50%;transform:translateY(-50%);width:16px;height:16px;border-radius:50%;background:#fff;border:2.5px solid #00b388;box-shadow:0 1px 6px rgba(0,0,0,.4);opacity:0;transition:opacity .2s}
.player-progress:active .pp-fill .pp-thumb,
.player-progress:hover .pp-fill .pp-thumb,
.player-progress.show-thumb .pp-fill .pp-thumb{opacity:1}
/* ---- Progress Tooltip ---- */
.pp-tooltip{position:fixed;z-index:105;pointer-events:none;opacity:0;transition:opacity .15s;left:50%;transform:translateX(-50%);bottom:calc(50px + 6px + 24px)}

.pp-tooltip.show{opacity:1}
.pp-tooltip .pp-tip-img{width:86px;height:130px;border-radius:10px;object-fit:cover;display:block;box-shadow:0 4px 20px rgba(0,0,0,.6);border:2px solid rgba(255,255,255,.2)}
.pp-tooltip .pp-tip-time{position:absolute;left:50%;bottom:-20px;transform:translateX(-50%);background:rgba(0,0,0,.75);backdrop-filter:blur(10px);-webkit-backdrop-filter:blur(10px);padding:2px 10px;border-radius:999px;font-size:11px;font-weight:600;color:#fff;white-space:nowrap;border:.5px solid rgba(255,255,255,.12)}
.bnav{position:fixed;left:0;right:0;bottom:0;z-index:100;height:50px;padding-bottom:env(safe-area-inset-bottom,0);background:rgba(0,0,0,.65);backdrop-filter:blur(60px);-webkit-backdrop-filter:blur(60px);border-top:.5px solid rgba(255,255,255,.1);display:flex;align-items:center;justify-content:center}
.bnav a{display:flex;flex-direction:column;align-items:center;justify-content:center;gap:2px;flex:1;height:100%;padding:4px 4px 2px;text-decoration:none;color:rgba(255,255,255,.55);transition:color .2s;-webkit-tap-highlight-color:transparent}
.bnav a.active{color:#fff}
.bnav svg{width:28px;height:28px;display:block;flex-shrink:0}
.bnav span{font-weight:400;font-size:10px;line-height:12px;letter-spacing:.008em;text-align:center}
#loading{position:fixed;inset:0;display:flex;align-items:center;justify-content:center;background:var(--bg);z-index:99;transition:opacity .4s}
#loading.hide{opacity:0;pointer-events:none}
.spinner{width:32px;height:32px;border:3px solid var(--accent-soft);border-top-color:var(--accent);border-radius:50%;animation:spin .7s linear infinite}
@keyframes spin{to{transform:rotate(360deg)}}
#toast{position:fixed;top:50%;left:50%;transform:translate(-50%,-50%) scale(.85);z-index:98;background:rgba(15,24,37,.88);backdrop-filter:blur(14px);color:#fff;padding:12px 26px;border-radius:12px;font-size:14px;font-weight:500;opacity:0;pointer-events:none;transition:all .22s;white-space:nowrap}
#toast.show{opacity:1;transform:translate(-50%,-50%) scale(1)}
.cm-drawer{position:fixed;inset:0;z-index:300;visibility:hidden;transition:visibility .3s}
.cm-drawer.open{visibility:visible}
.cm-drawer .cm-overlay{position:absolute;inset:0;background:rgba(0,0,0,.45);opacity:0;transition:opacity .3s}
.cm-drawer.open .cm-overlay{opacity:1}
.cm-drawer .cm-panel{position:absolute;left:0;right:0;bottom:0;max-height:70vh;background:#ffffff;border-radius:20px 20px 0 0;transform:translateY(100%);transition:transform .35s cubic-bezier(.22,1,.36,1);padding-top:12px;overflow:hidden;display:flex;flex-direction:column;box-shadow:0 -4px 30px rgba(0,0,0,.12)}
.cm-drawer.open .cm-panel{transform:translateY(0)}
.cm-drawer .cm-handle{width:36px;height:4px;border-radius:2px;background:rgba(0,0,0,.15);margin:0 auto 8px;flex-shrink:0}
.cm-drawer .cm-header{display:flex;align-items:center;justify-content:space-between;padding:4px 16px 12px;border-bottom:1px solid rgba(0,0,0,.06);flex-shrink:0}
.cm-drawer .cm-header .cm-title{font-size:16px;font-weight:600;color:#13202e}
.cm-drawer .cm-header .cm-close{width:32px;height:32px;border-radius:50%;background:rgba(0,0,0,.06);border:none;color:#5e6f83;font-size:18px;cursor:pointer;display:flex;align-items:center;justify-content:center;transition:all .2s}
.cm-drawer .cm-header .cm-close:active{background:rgba(0,0,0,.12);transform:scale(.9)}
.cm-drawer .cm-body{flex:1;overflow-y:auto;padding:0 0 env(safe-area-inset-bottom,0);-webkit-overflow-scrolling:touch}
.cm-drawer .cm-body::-webkit-scrollbar{width:0}
.cm-item{display:flex;gap:10px;padding:14px 16px;border-bottom:1px solid rgba(0,0,0,.05)}
.cm-item .cm-avatar{width:36px;height:36px;border-radius:50%;object-fit:cover;flex-shrink:0;border:1.5px solid rgba(0,0,0,.08)}
.cm-item .cm-content{flex:1;min-width:0}
.cm-item .cm-meta{display:flex;align-items:center;gap:8px;margin-bottom:4px}
.cm-item .cm-meta .cm-name{font-size:13px;font-weight:600;color:#13202e}
.cm-item .cm-meta .cm-time{font-size:11px;color:rgba(94,111,131,.7)}
.cm-item .cm-text{font-size:14px;line-height:1.55;color:#2d3e52;word-break:break-word}
.cm-item.cm-intro{background:rgba(0,179,136,.05);border-radius:0;border-bottom:1px solid rgba(0,179,136,.12)}
.cm-item.cm-intro .cm-meta .cm-name{color:#00b388}
/* comment section inside drawer */
.comment-panel{padding:12px 16px 0}
.comment-panel .comment-header{display:flex;align-items:center;gap:8px;color:rgba(94,111,131,.8);font-size:13px;margin-bottom:10px;padding:0 4px}
.comment-panel .comment-header .comment-title{font-weight:600;color:#13202e;font-size:14px}
.comment-input-wrap{display:flex;gap:8px;margin-bottom:14px;padding:0 4px}
.comment-input-wrap input{flex:1;min-width:0;padding:10px 16px;border-radius:999px;border:1.5px solid rgba(0,0,0,.08);background:#f5f7fa;color:#13202e;font-size:14px;outline:none;transition:border-color .2s,box-shadow .2s}
.comment-input-wrap input:focus{border-color:#00b388;box-shadow:0 0 0 3px rgba(0,179,136,.12)}
.comment-input-wrap input::placeholder{color:rgba(94,111,131,.6)}
.comment-input-wrap .send-btn{border:none;border-radius:999px;padding:10px 20px;background:linear-gradient(135deg,#00b388,#00c9a0);color:#fff;font-size:13px;font-weight:600;cursor:pointer;transition:all .2s;box-shadow:0 2px 8px rgba(0,179,136,.3)}
.comment-input-wrap .send-btn:active{transform:scale(.95);box-shadow:0 1px 4px rgba(0,179,136,.2)}
.c-actions{display:flex;gap:10px;margin-top:8px}
.c-actions button{background:none;border:none;color:rgba(94,111,131,.7);font-size:12px;cursor:pointer;padding:3px 6px;transition:all .2s;display:inline-flex;align-items:center;gap:4px;border-radius:6px}
.c-actions button:hover{color:#00b388;background:rgba(0,179,136,.06)}
.cm-item .cm-actions{margin-top:6px;display:flex;gap:8px}
.cm-item .cm-actions button{background:none;border:none;color:rgba(94,111,131,.7);font-size:11px;cursor:pointer;padding:3px 8px;border-radius:999px;transition:all .2s;display:inline-flex;align-items:center;gap:3px;background:rgba(0,0,0,.03)}
.cm-item .cm-actions button:active{background:rgba(0,179,136,.1);color:#00b388}
.comment-count{font-size:12px;color:rgba(94,111,131,.6)}
@media(max-width:768px){body{padding-bottom:0!important}}
@media(min-width:769px){#app{position:relative;max-width:400px;height:100vh;margin:0 auto}body{background:var(--bg);display:flex;align-items:center;justify-content:center}.bnav{max-width:400px;left:50%;transform:translateX(-50%)}.watch-bar{max-width:400px;left:50%!important;transform:translateX(-50%)!important}.player-progress{max-width:400px;left:50%!important;transform:translateX(-50%)}.cm-drawer .cm-panel{max-width:400px;left:50%;transform:translateX(-50%) translateY(100%)}.cm-drawer.open .cm-panel{transform:translateX(-50%) translateY(0)}}
</style>
</head>

const total=DATA.length;
let idx=0,animFlag=false,wh=0,paused=false;
const track=document.getElementById('track'),toast=document.getElementById('toast'),loading=document.getElementById('loading'),watchBar=document.getElementById('watchBar'),cmDrawer=document.getElementById('cmDrawer'),cmBody=document.getElementById('cmBody'),cmTitle=document.getElementById('cmTitle');
const playerProg=document.getElementById('playerProgress'),ppFill=document.getElementById('ppFill'),ppThumb=document.getElementById('ppThumb');
const ppTooltip=document.getElementById('ppTooltip'),ppTipImg=document.getElementById('ppTipImg'),ppTipTime=document.getElementById('ppTipTime');

/* ---- Player Progress Simulation ---- */
let playProgress = 0;
let playInterval = null;
const PROGRESS_SPEED = 0.003;
const EP_DURATION_SEC = 45;

function startPlayProgress(){
  if (playInterval) return;
  playInterval = setInterval(() => {
    if (paused) return;
    playProgress = Math.min(1, playProgress + PROGRESS_SPEED);
    updatePlayProgressUI();
    if (playProgress >= 1) {
      clearInterval(playInterval);
      playInterval = null;
    }
  }, 100);
}

function updatePlayProgressUI(){
  ppFill.style.width = (playProgress * 100) + '%';
}

function fmtTime(progress){
  const t = Math.round(progress * EP_DURATION_SEC);
  const m = Math.floor(t / 60);
  const s = t % 60;
  const tm = Math.floor(EP_DURATION_SEC / 60);
  const ts = EP_DURATION_SEC % 60;
  return `${String(m).padStart(2,'0')}:${String(s).padStart(2,'0')} / ${String(tm).padStart(2,'0')}:${String(ts).padStart(2,'0')}`;
}

function setPlayProgressFromEvent(e){
  const rect = playerProg.getBoundingClientRect();
  const x = (e.touches ? e.touches[0].clientX : e.clientX) - rect.left;
  playProgress = Math.max(0, Math.min(1, x / rect.width));
  updatePlayProgressUI();
  ppTipImg.src = DATA[idx].cover;
  ppTipTime.textContent = fmtTime(playProgress);
}

function onProgressPointerDown(e){
  e.stopPropagation();
  playerProg.classList.add('show-thumb');
  ppTooltip.classList.add('show');
  setPlayProgressFromEvent(e);
  document.addEventListener('mousemove', onProgressPointerMove);
  document.addEventListener('mouseup', onProgressPointerUp);
  document.addEventListener('touchmove', onProgressPointerMove, {passive: true});
  document.addEventListener('touchend', onProgressPointerUp);
}

function onProgressPointerMove(e){
  e.preventDefault();
  setPlayProgressFromEvent(e);
}

function onProgressPointerUp(e){
  playerProg.classList.remove('show-thumb');
  ppTooltip.classList.remove('show');
  document.removeEventListener('mousemove', onProgressPointerMove);
  document.removeEventListener('mouseup', onProgressPointerUp);
  document.removeEventListener('touchmove', onProgressPointerMove);
  document.removeEventListener('touchend', onProgressPointerUp);
  if (!playInterval && playProgress < 1) startPlayProgress();
}

function fmt(n){return n>=1e4?(n/1e4).toFixed(1)+'w':n>=1e3?(n/1e3).toFixed(1)+'k':n}
function showToast(msg){toast.textContent=msg;toast.classList.add('show');clearTimeout(toast._t);toast._t=setTimeout(()=>toast.classList.remove('show'),1600)}
function updateWatchBar(){const d=DATA[idx];if(!d)return;watchBar.querySelector('.wb-text').textContent=`观看完整短剧 · 全${d.totalEp}集`}

function ensureComments(d){
  if (d.comments) return;
  const names=['清风','明月','繁星','晨曦','暮雪','城北','城南','夜雨','晓风','归燕'];
  const texts=['好剧！剧情节奏把控得太好，已经追起来了。','期待更新🔥 每一集都很有代入感。','这部剧绝了，角色表现都在线。','追剧中…画面太美了！','剧情太精彩了，人物冲突很带感。','赞赞赞👍 这是今年最好看的AI短剧之一。','对白写得很棒，感情线也很细腻。','世界观很有意思，想多看几集。','节奏紧凑，反转不断，强烈推荐。','剧情扎实，演员演技也在线。'];
  d.comments = Array.from({length:5},(_,i)=>({
    id: Date.now() + i,
    name: names[(i + parseInt(d.id,10)) % names.length],
    avatar: names[(i + 2 + parseInt(d.id,10)) % names.length].slice(0,1),
    text: texts[(i + parseInt(d.id,10)) % texts.length],
    time: `${(i + 1) * 3}分钟前`,
    likes: 5 + i * 3,
  }));
}

function renderDrawerComments(d){
  ensureComments(d);
  const commentList = document.getElementById('drawerCommentList');
  const countEl = document.getElementById('drawerCommentCount');
  if (!commentList || !countEl) return;
  commentList.innerHTML = d.comments.map(c => `
    <div class="cm-item">
      <img class="cm-avatar" src="https://api.dicebear.com/7.x/thumbs/svg?seed=${c.name}" alt="${c.name}">
      <div class="cm-content">
        <div class="cm-meta"><span class="cm-name">${c.name}</span><span class="cm-time">${c.time}</span></div>
        <div class="cm-text">${c.text}</div>
        <div class="cm-actions"><button onclick="showToast('👍 点赞 +1','👍')">👍 ${c.likes}</button><button onclick="showToast('💬 回复功能开发中','💬')">💬 回复</button></div>
      </div>
    </div>
  `).join('');
  countEl.textContent = d.comments.length;
}

function postDrawerComment(id){
  const input = document.getElementById('drawerCommentInput');
  if (!input) return;
  const text = input.value.trim();
  if (!text){ showToast('请输入评论内容','✏️'); return; }
  if (text.length > 200){ showToast('评论不能超过200字','⚠️'); return; }
  const d = DATA.find(x => x.id === id);
  if (!d) return;
  ensureComments(d);
  const comment = {
    id: Date.now(),
    name: '我',
    avatar: '我',
    text,
    time: '刚刚',
    likes: 0,
  };
  d.comments.unshift(comment);
  input.value = '';
  renderDrawerComments(d);
  showToast('✅ 评论已发布','✅');
}

function openDrawer(id){
  const d=DATA.find(x=>x.id===id);
  if(!d)return;
  const introHtml = `<div class="cm-item cm-intro"><img class="cm-avatar" src="${d.cover}" alt="${d.title}"><div class="cm-content"><div class="cm-meta"><span class="cm-name">${d.title}</span></div><div class="cm-text">${d.desc}</div></div></div>`;
  cmTitle.textContent=`${d.title} - 讨论`;
  cmBody.innerHTML = `${introHtml}
    <div class="comment-panel">
      <div class="comment-header"><span class="comment-title">用户评论</span><span class="comment-count">(<span id="drawerCommentCount"></span>)</span></div>
      <div class="comment-input-wrap"><input id="drawerCommentInput" placeholder="写下你的评论..." maxlength="200" /><button class="send-btn" id="drawerSendBtn">发送</button></div>
      <div id="drawerCommentList"></div>
    </div>`;
  renderDrawerComments(d);
  document.getElementById('drawerSendBtn')?.addEventListener('click', function(e){ e.stopPropagation(); postDrawerComment(d.id); });
  document.getElementById('drawerCommentInput')?.addEventListener('keydown', function(e){ if (e.key === 'Enter') { e.preventDefault(); postDrawerComment(d.id); } });
  cmDrawer.classList.add('open');
}

function closeDrawer(){
  cmDrawer.classList.remove('open');
}

function render(){
  let h='';
  for(let i=0;i<total;i++){
    const d=DATA[i];
    const acts=d.actors.slice(0,2).map(a=>`<span class="c-name">${a}</span>`).join('<span class="c-div"> / </span>');
    const epText=d.ep.replace(/ \/ 共\d+集$/,'');
    h+=`<div class="slide" style="top:${i*100}vh"><img class="slide-img" src="${d.cover}" alt="${d.title}" loading="${i===0?'eager':'lazy'}" onerror="this.style.display='none'"/><div class="slide-mask"></div><div class="play-btn" id="pb_${d.id}"><svg viewBox="0 0 24 24"><path d="M8 5v14l11-7z"/></svg></div><div class="info"><div class="danmaku-btn"><svg viewBox="0 0 16 16" fill="none"><rect x="1.5" y="3" width="13" height="10" rx="2" stroke="currentColor" stroke-width="1.2"/><path d="M4.5 6.5h7" stroke="currentColor" stroke-width="1" stroke-linecap="round"/><path d="M4.5 8.5h5" stroke="currentColor" stroke-width="1" stroke-linecap="round"/><path d="M4.5 10.5h3" stroke="currentColor" stroke-width="1" stroke-linecap="round"/></svg>弹幕</div><div class="info-title" onclick="location.href='drama-detail.html'">${d.title}<span class="gt"> ›</span></div><div class="info-tags"><span class="info-rating"><span class="star">★</span>${d.rt}</span><span class="info-tag">${d.cat}</span><span class="info-tag">演员 · ${acts}</span></div><div class="info-desc"><span class="desc-ep">${epText}</span><span class="desc-sep">|</span><span class="desc-text">${d.desc}</span><span class="desc-expand" data-id="${d.id}">展开</span></div></div><div class="actions"><button class="act-creator"><img class="ac-avatar" src="${d.avatar}" alt="${d.author}"><span class="ac-label">${d.author}</span></button><button class="act-btn" data-act="fav" data-id="${d.id}"><div class="act-icon ${d.fav?'bookmarked':''}">${d.fav?'⭐':'☆'}</div><span class="act-label">收藏</span></button><button class="act-btn" data-act="cmt" data-id="${d.id}"><div class="act-icon">💬</div><span class="act-label">${fmt(d.cmts)}</span></button><button class="act-btn" data-act="like" data-id="${d.id}"><div class="act-icon ${d.like?'liked':''}">${d.like?'❤️':'🤍'}</div><span class="act-label">${fmt(d.likes)}</span></button><button class="act-btn" data-act="share" data-id="${d.id}"><div class="act-icon">↗</div><span class="act-label">分享</span></div></div></div>`;
  }
  track.innerHTML=h;
  track.style.height=(total*100)+'vh';
  wh=window.innerHeight;
  goTo(0,false);
  bindEvents();
  setTimeout(()=>loading.classList.add('hide'),350);
  updateWatchBar();
}

function goTo(i,animate){
  if(animFlag)return;
  if(animate)animFlag=true;
  i=Math.max(0,Math.min(total-1,i));idx=i;
  track.style.transition=animate?'transform .38s cubic-bezier(.22,1,.36,1)':'none';
  track.style.transform=`translateY(${-i*wh}px)`;
  updateWatchBar();
  if(animate)setTimeout(()=>{animFlag=false},400);
  /* Reset play progress on slide switch */
  playProgress = 0;
  updatePlayProgressUI();
  if (!playInterval) startPlayProgress();
}
function nextSlide(){if(idx>=total-1){showToast('— 已经到底啦 —');return}goTo(idx+1,true)}
function prevSlide(){if(idx<=0){showToast('— 已是最上 —');return}goTo(idx-1,true)}

function togglePause(e){
  if(e.target.closest('.actions')||e.target.closest('.info')||e.target.closest('.bnav')||e.target.closest('.play-btn')||e.target.closest('.player-progress'))return;
  paused=!paused;
  const btn=document.querySelector(`#pb_${DATA[idx].id}`);
  if(!btn)return;
  btn.classList.toggle('show',paused);
}

function bindEvents(){
  document.querySelectorAll('[data-act="like"]').forEach(b=>{b.addEventListener('click',function(e){e.stopPropagation();const d=DATA.find(x=>x.id===this.dataset.id);if(!d)return;d.like=!d.like;const ic=this.querySelector('.act-icon'),lb=this.querySelector('.act-label');if(d.like){ic.classList.add('liked');ic.textContent='❤️';d.likes++;showToast('已点赞 ❤️')}else{ic.classList.remove('liked');ic.textContent='🤍';d.likes--}lb.textContent=fmt(d.likes)})});
  document.querySelectorAll('[data-act="fav"]').forEach(b=>{b.addEventListener('click',function(e){e.stopPropagation();const d=DATA.find(x=>x.id===this.dataset.id);if(!d)return;d.fav=!d.fav;const ic=this.querySelector('.act-icon');if(d.fav){ic.classList.add('bookmarked');ic.textContent='⭐';showToast('已收藏 ⭐')}else{ic.classList.remove('bookmarked');ic.textContent='☆'}})});
  document.querySelectorAll('[data-act="cmt"]').forEach(b=>{b.addEventListener('click',function(e){e.stopPropagation();const d=DATA.find(x=>x.id===this.dataset.id);if(d)openDrawer(d.id)})});
  document.querySelectorAll('[data-act="share"]').forEach(b=>{b.addEventListener('click',function(e){e.stopPropagation();showToast('📋 分享功能开发中')})});
  document.querySelectorAll('.danmaku-btn').forEach(el=>{el.addEventListener('click',function(e){e.stopPropagation();showToast('💬 弹幕功能暂未开放')})});
  document.querySelectorAll('.act-creator').forEach(el=>{el.addEventListener('click',function(e){e.stopPropagation();showToast('👤 创作者主页')})});
  document.querySelectorAll('.info-author').forEach(el=>{el.addEventListener('click',function(){showToast(`👤 跳转 ${this.dataset.author} 的主页`)})});
  document.querySelectorAll('.desc-expand').forEach(el=>{el.addEventListener('click',function(e){e.stopPropagation();openDrawer(this.dataset.id)})});
  document.getElementById('cmClose').addEventListener('click',closeDrawer);
  document.getElementById('cmOverlay').addEventListener('click',closeDrawer);
  document.querySelectorAll('.slide').forEach(el=>{el.addEventListener('click',togglePause)});
  watchBar.addEventListener('click',function(){
    const d=DATA[idx];
    if(!d)return;
    location.href=`drama-player.html?id=${d.id}&title=${encodeURIComponent(d.title)}&total=${d.totalEp}&cat=${encodeURIComponent(d.cat)}&author=${encodeURIComponent(d.author)}&avatar=${encodeURIComponent(d.avatar)}&cover=${encodeURIComponent(d.cover)}`;
  });
  /* Player progress bar events */
  playerProg.addEventListener('mousedown', onProgressPointerDown);
  playerProg.addEventListener('touchstart', onProgressPointerDown, {passive: true});
}

let ts=0,td=0,sw=0;
document.addEventListener('touchstart',function(e){
  if(e.target.closest('.actions')||e.target.closest('.info')||e.target.closest('.bnav')||e.target.closest('.player-progress'))return;
  ts=e.touches[0].clientY;sw=1;
},{passive:true});
document.addEventListener('touchmove',function(e){
  if(!sw)return;
  td=e.touches[0].clientY-ts;
  const max=wh*.12;let dr=Math.max(-max,Math.min(max,td));
  if((idx===0&&dr>0)||(idx>=total-1&&dr<0))dr*=.25;
  track.style.transition='none';
  track.style.transform=`translateY(${-idx*wh+dr}px)`;
},{passive:true});
document.addEventListener('touchend',function(){
  if(!sw)return;sw=0;
  if(td<-wh*.12)nextSlide();else if(td>wh*.12)prevSlide();else goTo(idx,true);
  td=0;
},{passive:true});
window.addEventListener('resize',function(){wh=window.innerHeight;goTo(idx,false)});
document.addEventListener('keydown',function(e){if(e.key==='ArrowDown'||e.key==='ArrowRight')nextSlide();else if(e.key==='ArrowUp'||e.key==='ArrowLeft')prevSlide()});
render();
</script>
<script src="load-header.js"></script>
</body>
</html>
