<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Story.fun | 个人中心</title>
  <style>
    :root {
      --bg: #F8F9FB;
      --surface: #ffffff;
      --accent: #00b388;
      --accent-soft: rgba(0, 179, 136, 0.12);
      --accent-glow: rgba(0, 179, 136, 0.25);
      --text: #1C2024;
      --text-muted: #60646C;
      --text-sub: #8B8D98;
      --border: #D9D9E0;
      --border-light: #F0F0F3;
      --shadow-sm: 0 4px 12px rgba(27, 45, 71, 0.06);
      --shadow-md: 0 12px 28px rgba(27, 45, 71, 0.07);
      --shadow-lg: 0 20px 45px rgba(27, 45, 71, 0.10);
      --radius: 12px;
      --radius-lg: 16px;
      font-family: "PingFang SC", "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif;
    }
    * { box-sizing: border-box; margin: 0; }
    body { margin: 0; min-height: 100vh; background: var(--bg); color: var(--text); }
    .app-shell { max-width: 1440px; margin: 0 auto; }

    /* Gradient */
    .gradient-text { background: linear-gradient(45deg, #05DF72 0%, #00BBA7 50%, #00B8DB 100%); -webkit-background-clip: text; -webkit-text-fill-color: transparent; background-clip: text; }
    .gradient-bg { background: linear-gradient(45deg, #05DF72 0%, #00BBA7 50%, #00B8DB 100%); }

    /* Main Content */
    .main-content { padding: 32px 44px 96px; display: flex; flex-direction: column; gap: 32px; }

    /* ===== User Info Header Card ===== */
    .user-info-card { background: var(--surface); border: 1px solid var(--border-light); border-radius: var(--radius); padding: 40px; box-shadow: var(--shadow-sm); }
    .user-info-inner { display: flex; align-items: center; gap: 32px; }

    .avatar-wrap { flex-shrink: 0; }
    .avatar-gradient { width: 128px; height: 128px; border-radius: 99px; padding: 4px; background: linear-gradient(45deg, #05DF72 0%, #00BBA7 50%, #00B8DB 100%); box-shadow: 0px 4px 6px -4px rgba(0,0,0,0.1), 0px 10px 15px -3px rgba(0,0,0,0.1); }
    .avatar-bg { width: 100%; height: 100%; border-radius: 88px; background: var(--surface); display: flex; align-items: center; justify-content: center; }
    .avatar-bg .avatar-letter { font-size: 30px; font-weight: 700; }

    .user-info-body { flex: 1; min-width: 0; display: flex; flex-direction: column; gap: 16px; }
    .user-info-top { display: flex; justify-content: space-between; align-items: flex-start; gap: 16px; }
    .user-info-texts { display: flex; flex-direction: column; gap: 8px; }
    .user-name { font-size: 24px; font-weight: 700; color: var(--text); }
    .user-sub { display: flex; flex-direction: column; gap: 5px; }
    .user-sub-item { font-size: 14px; color: var(--text-sub); }
    .user-sub-item .label { color: var(--text-sub); }
    .user-sub-item .value { color: var(--text); font-weight: 500; }

    .btn-edit { padding: 10px 24px; border: 1px solid var(--border); border-radius: 8px; background: transparent; color: var(--text); font-size: 14px; cursor: pointer; transition: all 0.2s; white-space: nowrap; height: 44px; display: flex; align-items: center; gap: 6px; }
    .btn-edit:hover { border-color: var(--accent); color: var(--accent); }

    .user-stats { display: flex; gap: 24px; }
    .stat-item { display: flex; align-items: center; gap: 6px; font-size: 14px; color: var(--text-sub); }
    .stat-item .stat-num { font-weight: 700; color: var(--text); }

    /* ===== Tabs ===== */
    .tab-bar { display: flex; align-items: center; gap: 32px; border-bottom: 1px solid var(--border); }
    .tab-item { padding: 14px 0 18px; font-size: 16px; font-weight: 510; color: var(--text-muted); cursor: pointer; border-bottom: 2px solid transparent; transition: all 0.2s; background: none; border-top: none; border-left: none; border-right: none; }
    .tab-item:hover { color: var(--text); }
    .tab-item.active { color: var(--accent); border-bottom-color: var(--accent); font-weight: 700; }

    /* ===== Works Grid ===== */
    .works-grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 16px; }

    .work-card { background: var(--surface); border-radius: var(--radius); overflow: hidden; cursor: pointer; transition: transform 0.2s, box-shadow 0.2s; }
    .work-card:hover { transform: translateY(-2px); box-shadow: var(--shadow-md); }

    .work-cover-wrap { position: relative; overflow: hidden; }
    .work-cover { width: 100%; height: 280px; object-fit: cover; display: block; background: var(--border-light); }
    .work-cover-placeholder { width: 100%; height: 280px; background: linear-gradient(135deg, #E8ECF0, #D5DCE3); display: flex; align-items: center; justify-content: center; font-size: 48px; color: var(--text-sub); }

    .work-info { padding: 12px 16px 16px; display: flex; flex-direction: column; gap: 12px; }
    .work-title { font-size: 16px; font-weight: 700; color: var(--text); white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
    .work-meta { display: flex; align-items: center; gap: 12px; }
    .work-author { display: flex; align-items: center; gap: 4px; font-size: 14px; color: var(--text-sub); }
    .work-author svg { width: 18px; height: 18px; flex-shrink: 0; }

    .more-btn { display: flex; align-items: center; justify-content: center; padding: 32px 0; }
    .more-btn button { padding: 10px 32px; border-radius: 88px; border: none; background: var(--gradient-bg, linear-gradient(45deg, #05DF72 0%, #00BBA7 50%, #00B8DB 100%)); color: #fff; font-size: 14px; font-weight: 700; cursor: pointer; transition: opacity 0.2s; }
    .more-btn button:hover { opacity: 0.9; }

    /* Empty State */
    .empty-state { text-align: center; padding: 64px 24px; color: var(--text-sub); }
    .empty-state .empty-icon { font-size: 48px; margin-bottom: 16px; }
    .empty-state p { font-size: 15px; }

    /* Responsive */
    @media (max-width: 1200px) { .works-grid { grid-template-columns: repeat(3, 1fr); } }
    @media (max-width: 900px) {
      .main-content { padding: 24px 20px 64px; }
      .works-grid { grid-template-columns: repeat(2, 1fr); }
      .user-info-inner { flex-direction: column; align-items: flex-start; gap: 20px; }
      .user-info-top { flex-direction: column; align-items: flex-start; }
      .avatar-gradient { width: 96px; height: 96px; }
    }
    @media (max-width: 540px) {
      .works-grid { grid-template-columns: 1fr; }
      .tab-bar { gap: 16px; overflow-x: auto; }
      .tab-item { font-size: 14px; padding: 12px 0 14px; white-space: nowrap; }
      .user-info-card { padding: 24px; }
    }
  </style>
</head>
<body>
  <div class="app-shell">
    <div id="header-placeholder"></div>

    <div class="main-content">
      <!-- User Info Header Card -->
      <div class="user-info-card">
        <div class="user-info-inner">
          <div class="avatar-wrap">
            <div class="avatar-gradient">
              <div class="avatar-bg">
                <span class="avatar-letter gradient-text">叙</span>
              </div>
            </div>
          </div>
          <div class="user-info-body">
            <div class="user-info-top">
              <div class="user-info-texts">
                <div class="user-name" id="profileName">加密小白</div>
                <div class="user-sub" id="profileSub">
                  <div class="user-sub-item">
                    <span class="label">邮箱：</span><span class="value" id="profileEmail">crypto@story.fun</span>
                  </div>
                  <div class="user-sub-item">
                    <span class="label">钱包：</span><span class="value" id="profileWallet">0x7A2b...3fD8</span>
                  </div>
                </div>
              </div>
              <button class="btn-edit" onclick="showToast('🕘 编辑资料开发中')">✎ 编辑</button>
            </div>
            <div class="user-stats">
              <div class="stat-item">
                <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round" style="color:var(--text-sub);"><path d="M2 12a10 10 0 1 0 20 0 10 10 0 1 0-20 0"/><path d="M12 6v6l4 2"/></svg>
                <span>发布 <strong class="stat-num" id="profilePublished">3</strong> 部</span>
              </div>
              <div class="stat-item">
                <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round" style="color:var(--text-sub);"><polygon points="12 2 15.09 8.26 22 9.27 17 14.14 18.18 21.02 12 17.77 5.82 21.02 7 14.14 2 9.27 8.91 8.26 12 2"/></svg>
                <span>获赞 <strong class="stat-num" id="profileLikes">1.2k</strong></span>
              </div>
              <div class="stat-item">
                <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round" style="color:var(--text-sub);"><path d="M22 12h-4l-3 9L9 3l-3 9H2"/></svg>
                <span>浏览量 <strong class="stat-num" id="profileViews">8.5k</strong></span>
              </div>
            </div>
          </div>
        </div>
      </div>

      <!-- Tabs -->
      <div>
        <div class="tab-bar">
          <button class="tab-item active" data-tab="published" onclick="switchTab('published')">发布短剧</button>
          <button class="tab-item" data-tab="liked" onclick="switchTab('liked')">点赞</button>
          <button class="tab-item" data-tab="favorited" onclick="switchTab('favorited')">收藏</button>
        </div>
      </div>

      <!-- Works Grid - 发布短剧 -->
      <div id="tabPublished" class="works-grid">
        <div class="work-card">
          <div class="work-cover-wrap">
            <div class="work-cover-placeholder">🎬</div>
          </div>
          <div class="work-info">
            <div class="work-title">重生之门</div>
            <div class="work-meta">
              <div class="work-author">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"/><circle cx="12" cy="7" r="4"/></svg>
                Story.fun官方 · 50集
              </div>
            </div>
          </div>
        </div>
        <div class="work-card">
          <div class="work-cover-wrap">
            <div class="work-cover-placeholder">🎥</div>
          </div>
          <div class="work-info">
            <div class="work-title">长安如梦</div>
            <div class="work-meta">
              <div class="work-author">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"/><circle cx="12" cy="7" r="4"/></svg>
                Story.fun官方 · 24集
              </div>
            </div>
          </div>
        </div>
        <div class="work-card">
          <div class="work-cover-wrap">
            <div class="work-cover-placeholder">🌟</div>
          </div>
          <div class="work-info">
            <div class="work-title">星河传说</div>
            <div class="work-meta">
              <div class="work-author">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"/><circle cx="12" cy="7" r="4"/></svg>
                Story.fun官方 · 36集
              </div>
            </div>
          </div>
        </div>
        <div class="work-card">
          <div class="work-cover-wrap">
            <div class="work-cover-placeholder">📖</div>
          </div>
          <div class="work-info">
            <div class="work-title">时光代理人</div>
            <div class="work-meta">
              <div class="work-author">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"/><circle cx="12" cy="7" r="4"/></svg>
                Story.fun官方 · 12集
              </div>
            </div>
          </div>
        </div>
      </div>

      <!-- Empty state for liked / favorited tabs -->
      <div id="tabLiked" class="empty-state" style="display:none;">
        <div class="empty-icon">❤️</div>
        <p>暂无点赞的短剧</p>
      </div>
      <div id="tabFavorited" class="empty-state" style="display:none;">
        <div class="empty-icon">⭐</div>
        <p>暂无收藏的短剧</p>
      </div>
    </div>
  </div>

  <script src="load-header.js"></script>
  <script src="auth.js"></script>
  <script>
    /**
     * Tab switching
     */
    function switchTab(tab) {
      // Update tab buttons
      document.querySelectorAll('.tab-item').forEach(btn => {
        btn.classList.toggle('active', btn.dataset.tab === tab);
      });

      // Show/hide content
      document.getElementById('tabPublished').style.display = tab === 'published' ? 'grid' : 'none';
      document.getElementById('tabLiked').style.display = tab === 'liked' ? 'block' : 'none';
      document.getElementById('tabFavorited').style.display = tab === 'favorited' ? 'block' : 'none';
    }

    /**
     * Load user profile from auth.js
     */
    function loadProfile() {
      if (typeof currentUser === 'undefined') {
        setTimeout(loadProfile, 100);
        return;
      }

      const nameEl = document.getElementById('profileName');
      const emailEl = document.getElementById('profileEmail');
      const walletEl = document.getElementById('profileWallet');

      if (nameEl) nameEl.textContent = currentUser.name || '未登录用户';

      // Show email or wallet based on auth method
      const isEmail = currentUser.authMethod === 'email';
      if (emailEl && walletEl) {
        if (isEmail) {
          emailEl.textContent = currentUser.email || '未绑定邮箱';
          walletEl.textContent = currentUser.wallet || '未连接钱包';
        } else {
          emailEl.textContent = currentUser.email || '未绑定邮箱';
          walletEl.textContent = currentUser.wallet || '未连接钱包';
        }
      }
    }

    // Wait for auth to be ready
    document.addEventListener('DOMContentLoaded', loadProfile);
    document.addEventListener('header-loaded', loadProfile);
  </script>
</body>
</html>
