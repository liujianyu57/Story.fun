<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0,maximum-scale=1.0,user-scalable=no,viewport-fit=cover">
<title>Story.fun | 播放</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
:root{--bg:#f5faff;--accent:#00b388;font-family:"PingFang SC","Segoe UI",Roboto,"Helvetica Neue",Arial,sans-serif}
html,body{width:100%;height:100%;overflow:hidden;background:#0f1825;-webkit-tap-highlight-color:transparent;user-select:none}
#app{position:fixed;inset:0;overflow:hidden;background:#0f1825}
#track{position:absolute;left:0;top:0;width:100%;will-change:transform}
.slide{position:absolute;left:0;width:100%;height:100vh;overflow:hidden}
.slide-img{position:absolute;inset:0;width:100%;height:100%;object-fit:cover;display:block}
.slide-mask{position:absolute;inset:0;background:linear-gradient(180deg,rgba(15,24,37,0.1),rgba(15,24,37,0.05) 30%,rgba(15,24,37,0.4) 70%,rgba(15,24,37,0.82));pointer-events:none}
.play-btn{position:absolute;top:50%;left:50%;z-index:3;transform:translate(-50%,-50%);width:72px;height:72px;border-radius:50%;background:rgba(0,0,0,.5);backdrop-filter:blur(12px);-webkit-backdrop-filter:blur(12px);border:.5px solid rgba(255,255,255,.2);display:flex;align-items:center;justify-content:center;opacity:0;transition:opacity .25s;pointer-events:none;box-shadow:0 8px 32px rgba(0,0,0,.35)}
.play-btn.show{opacity:1}
.play-btn svg{width:30px;height:30px;fill:#fff;margin-left:3px}
.top-back{position:fixed;top:0;left:0;right:0;z-index:10;height:56px;padding-top:env(safe-area-inset-top,0);display:flex;align-items:flex-end;padding:0 12px 8px;background:linear-gradient(180deg,rgba(0,0,0,.45),transparent);pointer-events:none}
.top-back .back-btn{pointer-events:auto;width:36px;height:36px;border-radius:50%;background:rgba(0,0,0,.35);backdrop-filter:blur(10px);-webkit-backdrop-filter:blur(10px);border:.5px solid rgba(255,255,255,.15);display:flex;align-items:center;justify-content:center;cursor:pointer;color:#fff;transition:background .2s}
.top-back .back-btn:active{background:rgba(255,255,255,.2)}
.top-back .back-btn svg{width:20px;height:20px}
.top-back .title-bar{pointer-events:auto;margin-left:12px;color:#fff;font-size:15px;font-weight:600;text-shadow:0 2px 8px rgba(0,0,0,.5);overflow:hidden;white-space:nowrap;text-overflow:ellipsis;flex:1}
.top-back .ep-badge{pointer-events:auto;margin-right:4px;background:rgba(255,255,255,.15);backdrop-filter:blur(10px);-webkit-backdrop-filter:blur(10px);border:.5px solid rgba(255,255,255,.2);border-radius:999px;padding:4px 12px;font-size:11px;font-weight:600;color:#fff}
.info{position:absolute;left:18px;right:80px;bottom:calc(30px + 50px + env(safe-area-inset-bottom,0px) + 46px);z-index:2;display:flex;flex-direction:column;gap:6px}
.info-title{font-size:19px;font-weight:700;color:#fff;line-height:1.3;text-shadow:0 2px 12px rgba(0,0,0,.5)}
.info-author{font-size:12px;color:rgba(255,255,255,.75);display:flex;align-items:center;gap:5px;cursor:pointer}
.info-author img{width:20px;height:20px;border-radius:50%;border:1px solid rgba(255,255,255,.2);object-fit:cover}
.info-desc{font-size:12px;color:rgba(255,255,255,.6);line-height:1.5;display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;overflow:hidden}
.actions{position:absolute;right:10px;bottom:calc(40px + 50px + env(safe-area-inset-bottom,0px) + 50px + 46px);z-index:2;display:flex;flex-direction:column;align-items:center;gap:16px}
.act-btn{display:flex;flex-direction:column;align-items:center;gap:2px;cursor:pointer;border:none;background:none;padding:0;color:#fff;-webkit-tap-highlight-color:transparent;transition:transform .15s}
.act-btn:active{transform:scale(.82)}
.act-icon{width:44px;height:44px;border-radius:50%;display:flex;align-items:center;justify-content:center;background:rgba(255,255,255,.12);backdrop-filter:blur(8px);font-size:18px;transition:all .2s}
.act-icon.liked{color:#fff;background:var(--accent)}
.act-icon.bookmarked{color:#fff;background:#ffbb3a}
.act-label{font-size:10px;font-weight:500;color:rgba(255,255,255,.75);line-height:1}
/* ---- Bottom Control Bar ---- */
.bottom-bar{position:fixed;left:0;right:0;bottom:2px;z-index:11;height:44px;display:flex;align-items:center;justify-content:space-between;padding:0 16px;background:rgba(0,0,0,.35);backdrop-filter:blur(16px);-webkit-backdrop-filter:blur(16px);border-top:.5px solid rgba(255,255,255,.08);pointer-events:auto}
.bottom-bar .bb-left{display:flex;align-items:center;gap:8px;cursor:pointer;padding:4px 0}
.bottom-bar .bb-left .bb-ep{font-size:12px;font-weight:500;color:rgba(255,255,255,.85)}
.bottom-bar .bb-left .bb-dot{width:3px;height:3px;border-radius:50%;background:rgba(255,255,255,.3)}
.bottom-bar .bb-left .bb-status{font-size:10px;font-weight:500;color:rgba(0,179,136,.85);background:rgba(0,179,136,.15);border:.5px solid rgba(0,179,136,.25);padding:2px 8px;border-radius:999px}
.bottom-bar .bb-left .bb-total{font-size:12px;font-weight:400;color:rgba(255,255,255,.55)}
.bottom-bar .bb-left .bb-arrow{margin-left:2px;color:rgba(255,255,255,.4);font-size:14px;line-height:1}
.bottom-bar .bb-right{display:flex;align-items:center;gap:10px}
.bottom-bar .bb-right .bb-clean-btn{width:36px;height:36px;border-radius:50%;background:rgba(255,255,255,.1);backdrop-filter:blur(8px);-webkit-backdrop-filter:blur(8px);border:.5px solid rgba(255,255,255,.12);display:flex;align-items:center;justify-content:center;cursor:pointer;transition:all .2s;color:rgba(255,255,255,.75)}
.bottom-bar .bb-right .bb-clean-btn:active{background:rgba(255,255,255,.2);transform:scale(.9)}
.bottom-bar .bb-right .bb-clean-btn svg{width:18px;height:18px}
/* ---- Player Progress Bar ---- */
.player-progress{position:fixed;left:0;right:0;bottom:44px;z-index:12;height:4px;background:rgba(255,255,255,.12);cursor:pointer;pointer-events:auto;touch-action:none}
.player-progress .pp-fill{height:100%;width:0%;background:linear-gradient(90deg,#00b388,#34d399);border-radius:0 2px 2px 0;position:relative;transition:none}
.player-progress .pp-fill .pp-thumb{position:absolute;right:-7px;top:50%;transform:translateY(-50%);width:14px;height:14px;border-radius:50%;background:#fff;border:2px solid #00b388;box-shadow:0 1px 6px rgba(0,0,0,.4);opacity:0;transition:opacity .2s}
.player-progress:active .pp-fill .pp-thumb,
.player-progress:hover .pp-fill .pp-thumb,
.player-progress.show-thumb .pp-fill .pp-thumb{opacity:1}
/* ---- Progress Tooltip ---- */
.pp-tooltip{position:fixed;z-index:20;pointer-events:none;opacity:0;transition:opacity .15s;left:50%;transform:translateX(-50%);bottom:56px}
.pp-tooltip.show{opacity:1}
.pp-tooltip .pp-tip-img{width:140px;height:80px;border-radius:8px;object-fit:cover;display:block;box-shadow:0 4px 16px rgba(0,0,0,.5);border:1.5px solid rgba(255,255,255,.15)}
.pp-tooltip .pp-tip-time{position:absolute;left:50%;bottom:-18px;transform:translateX(-50%);background:rgba(0,0,0,.75);backdrop-filter:blur(10px);-webkit-backdrop-filter:blur(10px);padding:2px 10px;border-radius:999px;font-size:11px;font-weight:600;color:#fff;white-space:nowrap;border:.5px solid rgba(255,255,255,.12)}
#loading{position:fixed;inset:0;display:flex;align-items:center;justify-content:center;background:#0f1825;z-index:99;transition:opacity .4s}
#loading.hide{opacity:0;pointer-events:none}
.spinner{width:32px;height:32px;border:3px solid rgba(0,179,136,.12);border-top-color:var(--accent);border-radius:50%;animation:spin .7s linear infinite}
@keyframes spin{to{transform:rotate(360deg)}}
#toast{position:fixed;top:50%;left:50%;transform:translate(-50%,-50%) scale(.85);z-index:98;background:rgba(15,24,37,.88);backdrop-filter:blur(14px);color:#fff;padding:12px 26px;border-radius:12px;font-size:14px;font-weight:500;opacity:0;pointer-events:none;transition:all .22s;white-space:nowrap}
#toast.show{opacity:1;transform:translate(-50%,-50%) scale(1)}
/* ---- Episode Selector Drawer ---- */
.ep-drawer{position:fixed;inset:0;z-index:400;visibility:hidden;transition:visibility .3s}
.ep-drawer.open{visibility:visible}
.ep-drawer .ep-overlay{position:absolute;inset:0;background:rgba(0,0,0,.5);opacity:0;transition:opacity .3s}
.ep-drawer.open .ep-overlay{opacity:1}
.ep-drawer .ep-panel{position:absolute;left:0;right:0;bottom:0;max-height:75vh;background:#ffffff;border-radius:20px 20px 0 0;transform:translateY(100%);transition:transform .35s cubic-bezier(.22,1,.36,1);padding-top:12px;overflow:hidden;display:flex;flex-direction:column;box-shadow:0 -4px 30px rgba(0,0,0,.12)}
.ep-drawer.open .ep-panel{transform:translateY(0)}
.ep-drawer .ep-handle{width:36px;height:4px;border-radius:2px;background:rgba(0,0,0,.15);margin:0 auto 8px;flex-shrink:0}
.ep-drawer .ep-header{display:flex;align-items:center;justify-content:space-between;padding:4px 16px 14px;border-bottom:1px solid rgba(0,0,0,.06);flex-shrink:0}
.ep-drawer .ep-header .ep-title{font-size:16px;font-weight:600;color:#13202e;display:flex;align-items:center;gap:8px}
.ep-drawer .ep-header .ep-title .ep-status{font-size:10px;font-weight:500;color:rgba(0,179,136,.85);background:rgba(0,179,136,.12);border:.5px solid rgba(0,179,136,.25);padding:2px 8px;border-radius:999px}
.ep-drawer .ep-header .ep-close{width:32px;height:32px;border-radius:50%;background:rgba(0,0,0,.06);border:none;color:#5e6f83;font-size:18px;cursor:pointer;display:flex;align-items:center;justify-content:center;transition:all .2s}
.ep-drawer .ep-header .ep-close:active{background:rgba(0,0,0,.12);transform:scale(.9)}
.ep-drawer .ep-body{flex:1;overflow-y:auto;padding:14px 16px env(safe-area-inset-bottom,0);-webkit-overflow-scrolling:touch;display:grid;grid-template-columns:repeat(4,1fr);gap:10px}
.ep-drawer .ep-body::-webkit-scrollbar{width:0}
.ep-item{display:flex;align-items:center;justify-content:center;padding:10px 6px;border-radius:10px;background:rgba(0,0,0,.04);border:1px solid rgba(0,0,0,.06);font-size:13px;font-weight:500;color:#2d3e52;cursor:pointer;transition:all .2s;text-align:center}
.ep-item:active{background:rgba(0,179,136,.12);transform:scale(.92)}
.ep-item.active{background:var(--accent);color:#fff;border-color:var(--accent);font-weight:600}
/* ---- Comment Drawer (light theme) ---- */
.cm-drawer{position:fixed;inset:0;z-index:300;visibility:hidden;transition:visibility .3s}
.cm-drawer.open{visibility:visible}
.cm-drawer .cm-overlay{position:absolute;inset:0;background:rgba(0,0,0,.45);opacity:0;transition:opacity .3s}
.cm-drawer.open .cm-overlay{opacity:1}
.cm-drawer .cm-panel{position:absolute;left:0;right:0;bottom:0;max-height:70vh;background:#ffffff;border-radius:20px 20px 0 0;transform:translateY(100%);transition:transform .35s cubic-bezier(.22,1,.36,1);padding-top:12px;overflow:hidden;display:flex;flex-direction:column;box-shadow:0 -4px 30px rgba(0,0,0,.12)}
.cm-drawer.open .cm-panel{transform:translateY(0)}
.cm-drawer .cm-handle{width:36px;height:4px;border-radius:2px;background:rgba(0,0,0,.15);margin:0 auto 8px;flex-shrink:0}
.cm-drawer .cm-header{display:flex;align-items:center;justify-content:space-between;padding:4px 16px 12px;border-bottom:1px solid rgba(0,0,0,.06);flex-shrink:0}
.cm-drawer .cm-header .cm-title{font-size:16px;font-weight:600;color:#13202e}
.cm-drawer .cm-header .cm-close{width:32px;height:32px;border-radius:50%;background:rgba(0,0,0,.06);border:none;color:#5e6f83;font-size:18px;cursor:pointer;display:flex;align-items:center;justify-content:center;transition:all .2s}
.cm-drawer .cm-header .cm-close:active{background:rgba(0,0,0,.12);transform:scale(.9)}
.cm-drawer .cm-body{flex:1;overflow-y:auto;padding:0 0 env(safe-area-inset-bottom,0);-webkit-overflow-scrolling:touch}
.cm-drawer .cm-body::-webkit-scrollbar{width:0}
.cm-item{display:flex;gap:10px;padding:14px 16px;border-bottom:1px solid rgba(0,0,0,.05)}
.cm-item .cm-avatar{width:36px;height:36px;border-radius:50%;object-fit:cover;flex-shrink:0;border:1.5px solid rgba(0,0,0,.08)}
.cm-item .cm-content{flex:1;min-width:0}
.cm-item .cm-meta{display:flex;align-items:center;gap:8px;margin-bottom:4px}
.cm-item .cm-meta .cm-name{font-size:13px;font-weight:600;color:#13202e}
.cm-item .cm-meta .cm-time{font-size:11px;color:rgba(94,111,131,.7)}
.cm-item .cm-text{font-size:14px;line-height:1.55;color:#2d3e52;word-break:break-word}
.cm-item.cm-intro{background:rgba(0,179,136,.05);border-radius:0;border-bottom:1px solid rgba(0,179,136,.12)}
.cm-item.cm-intro .cm-meta .cm-name{color:#00b388}
.cm-item .cm-actions{margin-top:6px;display:flex;gap:8px}
.cm-item .cm-actions button{background:none;border:none;color:rgba(94,111,131,.7);font-size:11px;cursor:pointer;padding:3px 8px;border-radius:999px;transition:all .2s;display:inline-flex;align-items:center;gap:3px;background:rgba(0,0,0,.03)}
.cm-item .cm-actions button:active{background:rgba(0,179,136,.1);color:#00b388}
.comment-panel{padding:12px 16px 0}
.comment-panel .comment-header{display:flex;align-items:center;gap:8px;color:rgba(94,111,131,.8);font-size:13px;margin-bottom:10px;padding:0 4px}
.comment-panel .comment-header .comment-title{font-weight:600;color:#13202e;font-size:14px}
.comment-input-wrap{display:flex;gap:8px;margin-bottom:14px;padding:0 4px}
.comment-input-wrap input{flex:1;min-width:0;padding:10px 16px;border-radius:999px;border:1.5px solid rgba(0,0,0,.08);background:#f5f7fa;color:#13202e;font-size:14px;outline:none;transition:border-color .2s,box-shadow .2s}
.comment-input-wrap input:focus{border-color:#00b388;box-shadow:0 0 0 3px rgba(0,179,136,.12)}
.comment-input-wrap input::placeholder{color:rgba(94,111,131,.6)}
.comment-input-wrap .send-btn{border:none;border-radius:999px;padding:10px 20px;background:linear-gradient(135deg,#00b388,#00c9a0);color:#fff;font-size:13px;font-weight:600;cursor:pointer;transition:all .2s;box-shadow:0 2px 8px rgba(0,179,136,.3)}
.comment-input-wrap .send-btn:active{transform:scale(.95);box-shadow:0 1px 4px rgba(0,179,136,.2)}
.comment-count{font-size:12px;color:rgba(94,111,131,.6)}
@media(min-width:769px){#app{position:relative;max-width:400px;height:100vh;margin:0 auto}body{background:var(--bg);display:flex;align-items:center;justify-content:center}body,#loading{background:#f5faff!important}.bottom-bar{max-width:400px;left:50%;transform:translateX(-50%)}.cm-drawer .cm-panel{max-width:400px;left:50%;transform:translateX(-50%) translateY(100%)}.cm-drawer.open .cm-panel{transform:translateX(-50%) translateY(0)}.ep-drawer .ep-panel{max-width:400px;left:50%;transform:translateX(-50%) translateY(100%)}.ep-drawer.open .ep-panel{transform:translateX(-50%) translateY(0)}}
</style>

<body>
<div id="loading"><div class="spinner"></div></div>
<div id="toast"></div>
<div id="app">
  <div id="track"></div>
  <div class="top-back">
    <div class="back-btn" id="backBtn"><svg viewBox="0 0 24 24" fill="none"><path d="M15 18l-6-6 6-6" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/></svg></div>
    <span class="title-bar" id="titleBar">正在播放</span>
    <span class="ep-badge" id="epBadge">第1集</span>
  </div>
  <!-- Bottom Control Bar -->
  <div class="bottom-bar" id="bottomBar">
    <div class="bb-left" id="epSelectorBtn">
      <span class="bb-ep">选集</span>
      <span class="bb-dot"></span>
      <span class="bb-status">已完结</span>
      <span class="bb-total" id="bbTotal">全24集</span>
      <span class="bb-arrow">▸</span>
    </div>
    <div class="bb-right">
      <div class="bb-clean-btn" id="cleanPlayBtn"><svg viewBox="0 0 24 24" fill="none"><rect x="3" y="3" width="18" height="18" rx="3" stroke="currentColor" stroke-width="1.5"/><path d="M10 8l6 4-6 4V8z" fill="currentColor"/></svg></div>
    </div>
  </div>
  <!-- Player Progress Bar -->
  <div class="player-progress" id="playerProgress">
    <div class="pp-fill" id="ppFill">
      <div class="pp-thumb" id="ppThumb"></div>
    </div>
  </div>
  <!-- Progress Tooltip -->
  <div class="pp-tooltip" id="ppTooltip">
    <img class="pp-tip-img" id="ppTipImg" src="" alt="">
    <span class="pp-tip-time" id="ppTipTime">00:00 / 00:00</span>
  </div>
</div>

<!-- Episode Selector Drawer -->
<div class="ep-drawer" id="epDrawer">
  <div class="ep-overlay" id="epOverlay"></div>
  <div class="ep-panel">
    <div class="ep-handle"></div>
    <div class="ep-header">
      <div class="ep-title">选集 <span class="ep-status">已完结</span></div>
      <button class="ep-close" id="epClose">✕</button>
    </div>
    <div class="ep-body" id="epBody"></div>
  </div>
</div>

<!-- Comment Drawer -->

      <div class="cm-title" id="cmTitle">评论</div>

    </div>
    <div class="cm-body" id="cmBody"></div>
  </div>
</div>

<script>
const params=new URLSearchParams(location.search);
const dramaTitle=params.get('title')||'未命名短剧';
const dramaTotal=parseInt(params.get('total'))||24;
const dramaCover=params.get('cover')||'https://images.unsplash.com/photo-1534447677768-be436bb09401?auto=format&fit=crop&w=800&q=80';
const total=Math.min(dramaTotal,60);
const episodes=[];
for(let i=0;i<total;i++)episodes.push({idx:i,label:`第${i+1}集`,cover:dramaCover,desc:`精彩继续第${i+1}集，更有趣的剧情等待你来发现！`});

let idx=0,animFlag=false,wh=0,paused=false;
const track=document.getElementById('track'),toast=document.getElementById('toast'),loading=document.getElementById('loading'),titleBar=document.getElementById('titleBar'),epBadge=document.getElementById('epBadge'),backBtn=document.getElementById('backBtn'),bbTotal=document.getElementById('bbTotal');
const cmDrawer=document.getElementById('cmDrawer'),cmBody=document.getElementById('cmBody'),cmTitle=document.getElementById('cmTitle');
const epDrawer=document.getElementById('epDrawer'),epBody=document.getElementById('epBody');
const playerProg=document.getElementById('playerProgress'),ppFill=document.getElementById('ppFill'),ppThumb=document.getElementById('ppThumb');
const ppTooltip=document.getElementById('ppTooltip'),ppTipImg=document.getElementById('ppTipImg'),ppTipTime=document.getElementById('ppTipTime');

/* ---- Player Progress Simulation ---- */
let playProgress = 0; // 0-1 percentage
let playInterval = null;
const PROGRESS_SPEED = 0.003; // per tick (~3.5s to fill 1%)
const EP_DURATION_SEC = 45; // assume each episode is 45 seconds total

function startPlayProgress(){
  if (playInterval) return;
  playInterval = setInterval(() => {
    if (paused) return;
    playProgress = Math.min(1, playProgress + PROGRESS_SPEED);
    updatePlayProgressUI();
    if (playProgress >= 1) {
      clearInterval(playInterval);
      playInterval = null;
    }
  }, 100);
}

function updatePlayProgressUI(){
  ppFill.style.width = (playProgress * 100) + '%';
}

function fmtTime(progress){
  const t = Math.round(progress * EP_DURATION_SEC);
  const m = Math.floor(t / 60);
  const s = t % 60;
  const tm = Math.floor(EP_DURATION_SEC / 60);
  const ts = EP_DURATION_SEC % 60;
  return `${String(m).padStart(2,'0')}:${String(s).padStart(2,'0')} / ${String(tm).padStart(2,'0')}:${String(ts).padStart(2,'0')}`;
}

function setPlayProgressFromEvent(e){
  const rect = playerProg.getBoundingClientRect();
  const x = (e.touches ? e.touches[0].clientX : e.clientX) - rect.left;
  playProgress = Math.max(0, Math.min(1, x / rect.width));
  updatePlayProgressUI();
  /* Update tooltip */
  ppTipImg.src = episodes[idx].cover;
  ppTipTime.textContent = fmtTime(playProgress);
}

function onProgressPointerDown(e){
  e.stopPropagation();
  playerProg.classList.add('show-thumb');
  ppTooltip.classList.add('show');
  setPlayProgressFromEvent(e);
  document.addEventListener('mousemove', onProgressPointerMove);
  document.addEventListener('mouseup', onProgressPointerUp);
  document.addEventListener('touchmove', onProgressPointerMove, {passive: true});
  document.addEventListener('touchend', onProgressPointerUp);
}

function onProgressPointerMove(e){
  e.preventDefault();
  setPlayProgressFromEvent(e);
}

function onProgressPointerUp(e){
  playerProg.classList.remove('show-thumb');
  ppTooltip.classList.remove('show');
  document.removeEventListener('mousemove', onProgressPointerMove);
  document.removeEventListener('mouseup', onProgressPointerUp);
  document.removeEventListener('touchmove', onProgressPointerMove);
  document.removeEventListener('touchend', onProgressPointerUp);
  /* Resume progress if dragged to a new position and not complete */
  if (!playInterval && playProgress < 1) startPlayProgress();
}

/* ---- Comment Data ---- */
const commentsMap = new Map();

function ensureEpComments(epIdx){
  if (commentsMap.has(epIdx)) return;
  const names=['清风','明月','繁星','晨曦','暮雪','城北','城南','夜雨','晓风','归燕'];
  const texts=['好剧！剧情节奏把控得太好，已经追起来了。','期待更新🔥 每一集都很有代入感。','追剧中…画面太美了！','赞赞赞👍 这是今年最好看的AI短剧之一。','对白写得很棒，感情线也很细腻。','节奏紧凑，反转不断，强烈推荐。','剧情扎实，值得反复观看。','这个反转我没想到，编剧太强了！'];
  commentsMap.set(epIdx, Array.from({length:4},(_,i)=>({
    id: Date.now() + i,
    name: names[(i + epIdx) % names.length],
    avatar: names[(i + 2 + epIdx) % names.length].slice(0,1),
    text: texts[(i + epIdx) % texts.length],
    time: `${(i + 1) * 3}分钟前`,
    likes: 4 + i * 2,
  })));
}

/* ---- Toast ---- */
function showToast(msg){toast.textContent=msg;toast.classList.add('show');clearTimeout(toast._t);toast._t=setTimeout(()=>toast.classList.remove('show'),1600)}

/* ---- Episode Selector ---- */
function renderEpSelector(){
  epBody.innerHTML = episodes.map((ep,i) =>
    `<div class="ep-item ${i===idx?'active':''}" data-epidx="${i}">${ep.label}</div>`
  ).join('');
  document.querySelectorAll('.ep-item').forEach(el => {
    el.addEventListener('click', function(e){
      e.stopPropagation();
      const epIdx = parseInt(this.dataset.epidx);
      if (!isNaN(epIdx)) {
        closeEpDrawer();
        goTo(epIdx, true);
      }
    });
  });
}

function openEpDrawer(){
  renderEpSelector();
  epDrawer.classList.add('open');
}

function closeEpDrawer(){
  epDrawer.classList.remove('open');
}

/* ---- Drawer Comments ---- */
function renderDrawerComments(epIdx){
  ensureEpComments(epIdx);
  const comments = commentsMap.get(epIdx) || [];
  const commentList = document.getElementById('drawerCommentList');
  const countEl = document.getElementById('drawerCommentCount');
  if (!commentList || !countEl) return;
  commentList.innerHTML = comments.map(c => `
    <div class="cm-item">
      <img class="cm-avatar" src="https://api.dicebear.com/7.x/thumbs/svg?seed=${c.name}" alt="${c.name}">
      <div class="cm-content">
        <div class="cm-meta"><span class="cm-name">${c.name}</span><span class="cm-time">${c.time}</span></div>
        <div class="cm-text">${c.text}</div>
        <div class="cm-actions"><button onclick="event.stopPropagation();showToast('👍 点赞 +1')">👍 ${c.likes}</button><button onclick="event.stopPropagation();showToast('💬 回复功能开发中')">💬 回复</button></div>
      </div>
    </div>
  `).join('');
  countEl.textContent = comments.length;
}

function postDrawerComment(epIdx){
  const input = document.getElementById('drawerCommentInput');
  if (!input) return;
  const text = input.value.trim();
  if (!text){ showToast('请输入评论内容'); return; }
  if (text.length > 200){ showToast('评论不能超过200字'); return; }
  ensureEpComments(epIdx);
  const comments = commentsMap.get(epIdx);
  comments.unshift({
    id: Date.now(),
    name: '我',
    avatar: '我',
    text,
    time: '刚刚',
    likes: 0,
  });
  input.value = '';
  renderDrawerComments(epIdx);
  showToast('✅ 评论已发布');
}

function openDrawer(epIdx){
  const ep = episodes[epIdx];
  if (!ep) return;
  cmTitle.textContent = `${ep.label} - 讨论`;
  cmBody.innerHTML = `
    <div class="comment-panel">
      <div class="comment-header"><span class="comment-title">用户评论</span><span class="comment-count">(<span id="drawerCommentCount"></span>)</span></div>
      <div class="comment-input-wrap"><input id="drawerCommentInput" placeholder="写下你的评论..." maxlength="200" /><button class="send-btn" id="drawerSendBtn">发送</button></div>
      <div id="drawerCommentList"></div>
    </div>`;
  renderDrawerComments(epIdx);
  document.getElementById('drawerSendBtn')?.addEventListener('click', function(e){ e.stopPropagation(); postDrawerComment(epIdx); });
  document.getElementById('drawerCommentInput')?.addEventListener('keydown', function(e){ if (e.key === 'Enter') { e.preventDefault(); postDrawerComment(epIdx); } });
  cmDrawer.classList.add('open');
}

function closeDrawer(){ cmDrawer.classList.remove('open'); }

/* ---- Render ---- */
function updateMeta(){
  titleBar.textContent=dramaTitle;
  epBadge.textContent=episodes[idx].label;
  bbTotal.textContent=`全${total}集`;
}

function render(){
  let h='';
  for(let i=0;i<total;i++){
    const ep=episodes[i];
    h+=`<div class="slide" style="top:${i*100}vh"><img class="slide-img" src="${ep.cover}" alt="${ep.label}" loading="${i===0?'eager':'lazy'}" onerror="this.style.display='none'"/><div class="slide-mask"></div><div class="play-btn" id="pb_${i}"><svg viewBox="0 0 24 24"><path d="M8 5v14l11-7z"/></svg></div><div class="info"><div class="info-title">${ep.label}</div><div class="info-desc">${ep.desc}</div></div><div class="actions"><button class="act-btn" data-act="fav" data-idx="${i}"><div class="act-icon">☆</div><span class="act-label">收藏</span></button><button class="act-btn" data-act="cmt" data-idx="${i}"><div class="act-icon">💬</div><span class="act-label">评论</span></button><button class="act-btn" data-act="like" data-idx="${i}"><div class="act-icon">🤍</div><span class="act-label">点赞</span></button><button class="act-btn" data-act="share" data-idx="${i}"><div class="act-icon">↗</div><span class="act-label">分享</span></div></div></div>`;
  }
  track.innerHTML=h;track.style.height=(total*100)+'vh';wh=window.innerHeight;goTo(0,false);bindEvents();setTimeout(()=>loading.classList.add('hide'),350);
}

function goTo(i,animate){
  if(animFlag)return;if(animate)animFlag=true;i=Math.max(0,Math.min(total-1,i));idx=i;track.style.transition=animate?'transform .38s cubic-bezier(.22,1,.36,1)':'none';track.style.transform=`translateY(${-i*wh}px)`;updateMeta();if(animate)setTimeout(()=>{animFlag=false},400);
  /* Reset play progress on episode switch */
  playProgress = 0;
  updatePlayProgressUI();
  if (!playInterval) startPlayProgress();
}
function nextSlide(){if(idx>=total-1){showToast('— 已经是最后一集啦 —');return}goTo(idx+1,true)}
function prevSlide(){if(idx<=0){showToast('— 已是第一集 —');return}goTo(idx-1,true)}
function togglePause(e){if(e.target.closest('.actions')||e.target.closest('.info')||e.target.closest('.top-back')||e.target.closest('.cm-drawer')||e.target.closest('.bottom-bar')||e.target.closest('.ep-drawer'))return;paused=!paused;const btn=document.querySelector(`#pb_${idx}`);if(!btn)return;btn.classList.toggle('show',paused)}

function bindEvents(){
  document.querySelectorAll('[data-act="like"]').forEach(b=>{b.addEventListener('click',function(e){e.stopPropagation();const ic=this.querySelector('.act-icon');if(ic.classList.contains('liked')){ic.classList.remove('liked');ic.textContent='🤍'}else{ic.classList.add('liked');ic.textContent='❤️';showToast('已点赞 ❤️')}})});
  document.querySelectorAll('[data-act="fav"]').forEach(b=>{b.addEventListener('click',function(e){e.stopPropagation();const ic=this.querySelector('.act-icon');if(ic.classList.contains('bookmarked')){ic.classList.remove('bookmarked');ic.textContent='☆'}else{ic.classList.add('bookmarked');ic.textContent='⭐';showToast('已收藏 ⭐')}})});
  document.querySelectorAll('[data-act="cmt"]').forEach(b=>{b.addEventListener('click',function(e){e.stopPropagation();const epIdx=parseInt(this.dataset.idx);if(!isNaN(epIdx))openDrawer(epIdx)})});
  document.querySelectorAll('[data-act="share"]').forEach(b=>{b.addEventListener('click',function(e){e.stopPropagation();showToast('📋 分享功能开发中')})});
  document.querySelectorAll('.slide').forEach(el=>{el.addEventListener('click',togglePause)});
  document.getElementById('cmClose').addEventListener('click',closeDrawer);
  document.getElementById('cmOverlay').addEventListener('click',closeDrawer);
  document.getElementById('epSelectorBtn').addEventListener('click',function(e){e.stopPropagation();openEpDrawer()});
  document.getElementById('epClose').addEventListener('click',closeEpDrawer);
  document.getElementById('epOverlay').addEventListener('click',closeEpDrawer);
  document.getElementById('cleanPlayBtn').addEventListener('click',function(e){e.stopPropagation();showToast('🔇 清屏播放功能暂未开放')});
  backBtn.addEventListener('click',function(){history.back()});
  /* Player progress bar events */
  playerProg.addEventListener('mousedown', onProgressPointerDown);
  playerProg.addEventListener('touchstart', onProgressPointerDown, {passive: true});
}

let ts=0,td=0,sw=0;
document.addEventListener('touchstart',function(e){if(e.target.closest('.actions')||e.target.closest('.info')||e.target.closest('.top-back')||e.target.closest('.cm-drawer')||e.target.closest('.bottom-bar')||e.target.closest('.ep-drawer'))return;ts=e.touches[0].clientY;sw=1;},{passive:true});
document.addEventListener('touchmove',function(e){if(!sw)return;td=e.touches[0].clientY-ts;const max=wh*.12;let dr=Math.max(-max,Math.min(max,td));if((idx===0&&dr>0)||(idx>=total-1&&dr<0))dr*=.25;track.style.transition='none';track.style.transform=`translateY(${-idx*wh+dr}px)`;},{passive:true});
document.addEventListener('touchend',function(){if(!sw)return;sw=0;if(td<-wh*.12)nextSlide();else if(td>wh*.12)prevSlide();else goTo(idx,true);td=0;},{passive:true});
window.addEventListener('resize',function(){wh=window.innerHeight;goTo(idx,false)});
document.addEventListener('keydown',function(e){if(e.key==='ArrowDown'||e.key==='ArrowRight')nextSlide();else if(e.key==='ArrowUp'||e.key==='ArrowLeft')prevSlide()});
updateMeta();render();
</script>
</body>
</html>
